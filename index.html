  function colorForPowerLabel(label) {
    if ((label || "").includes("白賊七")) return colorForRole("白賊七");
    if ((label || "").includes("虎姑婆")) return colorForRole("虎姑婆");
    if ((label || "").includes("好鼻師")) return colorForRole("好鼻師");
    if ((label || "").includes("小潔")) return colorForRole("小潔");
    if ((label || "").includes("局長")) return colorForRole("局長");
    if ((label || "").includes("水蛇") || (label || "").includes("水男孩")) return colorForRole("水蛇");
    if ((label || "").includes("蜥蜴")) return colorForRole("蜥蜴");
    return "var(--gold)";
  }

  function normalizePowerKey(label) {
    const text = String(label || "").trim();
    if (!text) return null;
    if (text === "我都理解") return null;
    if (text === "水蛇" || text === "水男孩" || text === "水蛇、水男孩" || text === "水蛇 / 水男孩") return "水蛇、水男孩";
    return text;
  }

  function splitPowerLabel(label) {
    const normalized = normalizePowerKey(label);
    if (!normalized) return null;
    if (normalized === "水蛇、水男孩") {
      return { role: "水蛇／水男孩", power: "水刃／幻化為水", color: colorForRole("水蛇") };
    }
    if (!normalized.includes("：")) {
      if (normalized === "虎姑婆") {
        return { role: "虎姑婆", power: "力氣大 / 近身搏鬥", color: colorForRole("虎姑婆") };
      }
      return { role: normalized, power: normalized, color: colorForPowerLabel(normalized) };
    }
    const [role, power] = normalized.split("：");
    return {
      role: role.trim(),
      power: power.trim(),
      color: colorForPowerLabel(normalized)
    };
  }

  function powerSummaryCards() {
    const likedMap = countSingle(respondents, "coolPower");
    const boringMap = countSingle(respondents, "boringPower");
    const confusingMap = countMulti(respondents, "confusing");
    const normalizedLiked = {};
    const normalizedBoring = {};
    const normalizedConfusing = {};
    Object.entries(likedMap).forEach(([label, count]) => {
      const key = normalizePowerKey(label);
      if (!key) return;
      normalizedLiked[key] = (normalizedLiked[key] || 0) + count;
    });
    Object.entries(boringMap).forEach(([label, count]) => {
      const key = normalizePowerKey(label);
      if (!key) return;
      normalizedBoring[key] = (normalizedBoring[key] || 0) + count;
    });
    Object.entries(confusingMap).forEach(([label, count]) => {
      const key = normalizePowerKey(label);
      if (!key) return;
      normalizedConfusing[key] = (normalizedConfusing[key] || 0) + count;
    });

    const labels = Array.from(new Set(
      Object.keys(normalizedLiked)
        .concat(Object.keys(normalizedBoring))
        .concat(Object.keys(normalizedConfusing))
    ));
    const roleBuckets = {};

    labels.forEach((label) => {
      const meta = splitPowerLabel(label);
      if (!meta) return;
      const liked = normalizedLiked[label] || 0;
      const boring = normalizedBoring[label] || 0;
      const confusing = normalizedConfusing[label] || 0;
      if (!roleBuckets[meta.role]) {
        roleBuckets[meta.role] = {
          role: meta.role,
          color: meta.color,
          powers: [],
          peak: 0,
          likedTotal: 0
        };
      }
      roleBuckets[meta.role].powers.push({
        power: meta.power,
        metrics: [
          { label: "最喜歡", value: liked, ratio: pctValue(liked, respondents.length), color: roleTone(meta.role === "水蛇／水男孩" ? "水蛇" : meta.role, 1) },
          { label: "最無聊", value: boring, ratio: pctValue(boring, respondents.length), color: "rgba(201,110,108,.82)" },
          { label: "看不懂", value: confusing, ratio: pctValue(confusing, respondents.length), color: "rgba(185,178,166,.78)" }
        ],
        peak: Math.max(liked, boring, confusing),
        liked
      });
      roleBuckets[meta.role].peak = Math.max(roleBuckets[meta.role].peak, liked, boring, confusing);
      roleBuckets[meta.role].likedTotal += liked;
    });

    return Object.values(roleBuckets)
      .map((item) => ({
        ...item,
        powers: item.powers
          .filter((power) => power.peak > 0)
          .sort((a, b) => b.peak - a.peak || b.liked - a.liked || a.power.localeCompare(b.power, "zh-Hant"))
      }))
      .filter((item) => item.powers.length)
      .sort((a, b) => b.peak - a.peak || b.likedTotal - a.likedTotal || a.role.localeCompare(b.role, "zh-Hant"));
  }

  function renderPowerSummaryMatrix(cards) {
    const rows = cards.flatMap((card) => card.powers.map((power) => ({
      role: card.role,
      roleColor: card.color,
      power: power.power,
      liked: power.metrics[0].value,
      boring: power.metrics[1].value,
      confusing: power.metrics[2].value
    })));
    if (!rows.length) return "";
    const likedMax = Math.max.apply(null, rows.map((row) => row.liked).concat([0]));
    const boringMax = Math.max.apply(null, rows.map((row) => row.boring).concat([0]));
    const confusingMax = Math.max.apply(null, rows.map((row) => row.confusing).concat([0]));
    return `
      <div class="power-matrix-wrap">
        <table class="power-matrix">
          <thead>
            <tr>
              <th>角色</th>
              <th>超能力</th>
              <th>最喜歡</th>
              <th>最無聊</th>
              <th>看不懂</th>
            </tr>
          </thead>
          ${cards.map((card) => `
            <tbody>
              ${card.powers.map((power, index) => {
                const liked = power.metrics[0].value;
                const boring = power.metrics[1].value;
                const confusing = power.metrics[2].value;
                const likedLeader = likedMax > 0 && liked === likedMax;
                const boringLeader = boringMax > 0 && boring === boringMax;
                const confusingLeader = confusingMax > 0 && confusing === confusingMax;
                const leaderStyle = `--leader-color:${card.color}`;
                const renderValue = (value, isLeader, flagClass) => `
                  <span class="power-matrix-value ${isLeader ? "is-leader" : ""}" ${isLeader ? `style="${leaderStyle}"` : ""}>
                    ${isLeader ? `<span class="power-matrix-flag ${flagClass}" style="${leaderStyle}"></span>` : `<span class="power-matrix-flag is-placeholder flag-star"></span>`}
                    <span class="power-matrix-count">${value}票</span>
                  </span>
                `;
                return `
                  <tr>
                    ${index === 0 ? `<td class="power-matrix-role" rowspan="${card.powers.length}" style="color:${card.color}">${card.role}</td>` : ""}
                    <td class="power-matrix-power" style="color:color-mix(in srgb, ${card.color} 72%, white)">${power.power}</td>
                    <td>${renderValue(liked, likedLeader, "flag-star")}</td>
                    <td>${renderValue(boring, boringLeader, "flag-warn")}</td>
                    <td>${renderValue(confusing, confusingLeader, "flag-warn")}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          `).join("")}
        </table>
      </div>
    `;
  }

  function renderHistogram() {
    const counts = Array.from({ length: 10 }, (_, index) => {
      const label = index + 1;
      return { label, count: respondents.filter((row) => row.scriptScore === label).length };
    });
    const width = 1120;
    const height = 340;
    const pad = { top: 20, right: 22, bottom: 58, left: 64 };
    const innerWidth = width - pad.left - pad.right;
    const innerHeight = height - pad.top - pad.bottom;
    const maxCount = Math.max.apply(null, counts.map((item) => item.count).concat([1]));
    const yMax = Math.max(15, Math.ceil(maxCount / 5) * 5);
    const yTicks = Array.from({ length: yMax / 5 + 1 }, (_, index) => index * 5);
    const step = innerWidth / counts.length;
    const barWidth = Math.min(54, step * 0.62);
    const y = (value) => pad.top + innerHeight - value / yMax * innerHeight;
    return `
      <div class="histogram-panel">
        <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
          <text x="18" y="${pad.top + innerHeight / 2}" fill="var(--text-soft)" font-size="12" transform="rotate(-90 18 ${pad.top + innerHeight / 2})">人數</text>
          <text x="${pad.left + innerWidth / 2}" y="${height - 10}" fill="var(--text-soft)" font-size="12" text-anchor="middle">分數</text>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.14)"></line>
          <line x1="${pad.left}" y1="${pad.top + innerHeight}" x2="${pad.left + innerWidth}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.14)"></line>
          ${yTicks.map((tick) => `
            <g>
              <line x1="${pad.left}" y1="${y(tick)}" x2="${pad.left + innerWidth}" y2="${y(tick)}" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></line>
              <text x="${pad.left - 10}" y="${y(tick) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${tick}</text>
            </g>
          `).join("")}
          ${counts.map((item, index) => {
            const centerX = pad.left + step * index + step / 2;
            const barHeight = item.count === 0 ? 8 : Math.max(12, innerHeight * (item.count / yMax));
            const topY = pad.top + innerHeight - barHeight;
            const fill = item.count === 0 ? "rgba(255,255,255,.08)" : (item.label >= 7 ? "var(--gold)" : item.label >= 5 ? "var(--orange)" : "var(--stone)");
            const stroke = item.count === 0 ? "rgba(255,255,255,.12)" : "none";
            return `
            <g>
              <rect x="${centerX - barWidth / 2}" y="${topY}" width="${barWidth}" height="${barHeight}" rx="10" fill="${fill}" stroke="${stroke}"></rect>
              <text x="${centerX}" y="${topY - 8}" fill="var(--text-soft)" font-size="11" text-anchor="middle">${item.count}</text>
              <text x="${centerX}" y="${pad.top + innerHeight + 18}" fill="var(--muted)" font-size="11" text-anchor="middle">${item.label}</text>
            </g>
          `;
          }).join("")}
        </svg>
      </div>
    `;
  }

  function cleanSupplementSentence(sentence) {
    return String(sentence || "")
      .replace(/^(辛苦了[，、。！!\s]*)+/g, "")
      .replace(/^(感謝[，、。！!\s]*)+/g, "")
      .replace(/^(謝謝[，、。！!\s]*)+/g, "")
      .replace(/^(加油[～~！!\s]*)+/g, "")
      .replace(/^(預祝[^\n。！？]*[。！？]?)/g, "")
      .replace(/^(很高興[^\n。！？]*[。！？]?)/g, "")
      .replace(/^(希望[^\n。！？]*順利[。！？]?)/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function trimSupplementExcerpt(text, maxLength) {
    const cleaned = String(text || "").replace(/\s+/g, " ").trim();
    if (!cleaned) return "";
    if (cleaned.length <= maxLength) return cleaned;
    const chunks = cleaned.split(/(?<=[。！？；])/).map((part) => part.trim()).filter(Boolean);
    let output = "";
    for (const chunk of chunks) {
      const candidate = output ? `${output}${chunk}` : chunk;
      if (candidate.length > maxLength) break;
      output = candidate;
    }
    return output || cleaned.slice(0, maxLength);
  }

  function supplementSentenceScore(sentence) {
    const text = cleanSupplementSentence(sentence);
    if (!text) return -999;
    let score = 0;
    if (text.length >= 18) score += 1;
    if (text.length >= 28) score += 1;
    if (/(建議|應該|需要|可以|最好|建議可|要再|不夠|不足|太|偏|薄弱|突兀|不明確|看不懂|沒看懂|關鍵|設定|角色|動機|結尾|收尾|節奏|特效|動作|場面|支線|能力|世界觀|宇宙觀|妖怪|局長|狐仙|小潔|虎姑婆|白賊七|好鼻師|鄧小姐|情感|母子|關係|場|序|核彈|反派)/.test(text)) score += 4;
    if (/(如果|例如|像是|對應|不然|否則)/.test(text)) score += 1;
    if (/(謝謝|感謝|辛苦了|加油|期待成品|期待上映|期待拍出來|我會去看|我會看|祝福|預祝|讚讚|沒有|無|沒了|很棒|好看|滿有趣|題材有趣|期待)/.test(text) && !/(但|不過|建議|應該|需要|可以|太|不夠|不足|薄弱|突兀|不明確|看不懂|沒看懂)/.test(text)) score -= 5;
    if (text.length <= 6) score -= 4;
    return score;
  }

  function supplementThemeKey(text) {
    if (/(結尾|收尾|狐仙|核彈|最終|大魔王|boss)/.test(text)) return "ending";
    if (/(情感|共鳴|關係|母子|小潔|虎姑婆|白賊七|好鼻師|鄧小姐|角色|人設|魅力)/.test(text)) return "character";
    if (/(設定|世界觀|宇宙觀|妖怪|妖族|魔族|能力|他心通|六神通|封神榜)/.test(text)) return "world";
    if (/(節奏|拖沓|段落|場|序|動機|支線|鋪陳|反派|局長)/.test(text)) return "plot";
    if (/(特效|動作|畫面|鏡頭|剪輯|拍攝)/.test(text)) return "visual";
    return "other";
  }

  function collectSupplementNotes(rows) {
    if (supplementNoteOverrides.length) {
      return supplementNoteOverrides;
    }
    const ignored = new Set(["沒有", "無", "無。", "沒有。", "-", "—", "暫無", "沒有，謝謝", "謝謝邀請", "讚讚"]);
    const ignoredNames = new Set(["劉瑋澔", "林冠邦", "李守治", "林哲毅", "吳政鴻", "莊字東", "王羿涵"]);
    const cards = [];
    const seenTopics = [];
    rows.forEach((row) => {
      const raw = String(row.finalNote || "").trim();
      if (!raw || ignored.has(raw)) return;
      if (ignoredNames.has(row.name)) return;
      const sections = splitQuoteIntoReadableSections(raw);
      const chunks = (sections.length ? sections : raw.split(/(?<=[。！？；])/))
        .map((part) => cleanSupplementSentence(part))
        .filter(Boolean);
      const ranked = chunks
        .map((chunk) => ({
          text: trimSupplementExcerpt(chunk.replace(/[。]+$/g, ""), 118),
          score: supplementSentenceScore(chunk),
          theme: supplementThemeKey(chunk)
        }))
        .filter((item) => item.text && item.score >= 4 && item.theme !== "other")
        .sort((a, b) => b.score - a.score || b.text.length - a.text.length);
      const best = ranked[0];
      if (!best) return;
      const tokens = tokenizeQuote(best.text);
      const isDuplicate = seenTopics.some((topic) => {
        const overlap = [...tokens].filter((token) => topic.has(token)).length;
        const base = Math.max(1, Math.min(tokens.size, topic.size));
        return overlap / base >= 0.6;
      });
      if (isDuplicate) return;
      seenTopics.push(tokens);
      cards.push({
        name: row.name || "匿名",
        text: best.text,
        score: best.score,
        theme: best.theme
      });
    });
    const themeOrder = { plot: 0, character: 1, world: 2, ending: 3, visual: 4, other: 5 };
    return cards
      .sort((a, b) => (themeOrder[a.theme] || 9) - (themeOrder[b.theme] || 9) || b.score - a.score || a.name.localeCompare(b.name, "zh-Hant"))
      .slice(0, 16);
  }

    const top = supplementTopRowOrder
      .map((name) => notes.find((note) => note.name === name))
      .filter(Boolean);
    const rest = notes.filter((note) => !topSet.has(note.name));
    return { top, rest };
  }

    { regex: /日本動漫作品(?:的)?影子|日本動漫作品/ig, reason: "泛指類型描述，非具體作品" }
  ];

  const associationFallbackPlacements = [
    { x: 12, y: 18, color: "var(--stone)" },
    { x: 22, y: 18, color: "var(--stone)" },
    { x: 32, y: 18, color: "var(--stone)" },

  ];

  function normalizeAssociationSource(text) {
    return String(text || "")
      .replace(/[「」《》〈〉]/g, "")
      .replace(/[、；;,/]/g, " ")
      .replace(/\r/g, "\n")
      .replace(/[（）]/g, (char) => (char === "（" ? "(" : ")"))
      .replace(/\s+/g, " ")
      .trim();
  }

  function extractAssociationAnalysis(rows) {
    const rawMentions = [];
    const normalizationMap = [];
    const excluded = [];
    const normalizedHits = new Map();
    const seenRawMap = new Set();
    const sourceRows = rows
      .map((row, index) => ({ row, index, text: normalizeAssociationSource(row.association) }))
      .filter((item) => item.text && !/^(沒有|無)$/.test(item.text));

    sourceRows.forEach(({ row, index, text }) => {
      const perResponseStandards = new Set();
      excludedAssociationRules.forEach((rule) => {
        const matches = text.match(rule.regex) || [];
        matches.forEach((match) => {
          excluded.push({
            respondentIndex: index,
            respondentName: row.name || `#${index + 1}`,
            raw: match,
            reason: rule.reason
          });
        });
      });

      associationTitleRules.forEach((rule) => {
        const matches = Array.from(text.matchAll(rule.regex));
        matches.forEach((match) => {
          const raw = String(match[0] || "").trim();
          if (!raw) return;
          rawMentions.push({
            respondentIndex: index,
            respondentName: row.name || `#${index + 1}`,
            raw,
            standardized: rule.label
          });
          const mapKey = `${raw}=>${rule.label}`;
          if (!seenRawMap.has(mapKey)) {
            seenRawMap.add(mapKey);
            normalizationMap.push({
              raw,
              standardized: rule.label
            });
          }
          if (perResponseStandards.has(rule.label)) return;
          perResponseStandards.add(rule.label);
          normalizedHits.set(rule.label, (normalizedHits.get(rule.label) || 0) + 1);
        });
      });
    });

    const aggregated = Array.from(normalizedHits.entries())
      .map(([label, count]) => ({
        label,
        count,
        review: associationTitleRules.find((rule) => rule.label === label)?.review || false
      }))
      .filter((item) => item.count > 1)
      .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "zh-Hant"));

    const missingPlacement = [];
    const renderedItems = aggregated.map((item, index) => {
      const placement = associationPlacementMap[item.label] || associationFallbackPlacements[index % associationFallbackPlacements.length];
      if (!associationPlacementMap[item.label]) missingPlacement.push(item.label);
      return {
        label: item.label,
        count: item.count,
        x: placement.x,
        y: placement.y,
        color: placement.color,
        size: item.count >= 8 ? 56 : item.count >= 7 ? 50 : item.count >= 5 ? 38 : item.count >= 3 ? 30 : 22
      };
    });

    const debug = {
      sourceQuestion: "閱讀劇本時，你是否有聯想到其他電影？請舉例說明",
      sourceRowCount: sourceRows.length,
      rawMentions,
      normalizationMap,
      excluded,
      aggregated,
      reviewTitles: aggregated.filter((item) => item.review).map((item) => item.label),
      renderedBubbleLabels: renderedItems.map((item) => item.label),
      missingPlacement
    };
    window.__associationDebug = debug;
    console.info("[association-debug]", debug);
    return {
      aggregated,
      items: renderedItems,
      debug,
      sourceRowCount: sourceRows.length
    };
  }

    const ranked = ageBuckets.map((bucket) => ({ name: `${bucket}族群`, pct: nukeItem.values[bucket].pct })).sort((a, b) => b.pct - a.pct);
    const highestRank = ranked[0] || { name: "目前樣本", pct: 0 };
    const lowestRank = ranked[ranked.length - 1] || { name: "目前樣本", pct: 0 };
    const rolePeak = roleItems.map((item) => ({
      label: item.label,
      top: ageBuckets.map((bucket) => ({ bucket, pct: item.values[bucket].pct })).sort((a, b) => b.pct - a.pct)[0]
    })).sort((a, b) => b.top.pct - a.top.pct)[0] || { label: "無", top: { bucket: "無", pct: 0 } };
    const marketPeak = marketItems.map((item) => ({
      label: item.label,
      top: ageBuckets.map((bucket) => ({ bucket, pct: item.values[bucket].pct })).sort((a, b) => b.pct - a.pct)[0]
    })).sort((a, b) => b.top.pct - a.top.pct)[0] || { label: "無", top: { bucket: "無", pct: 0 } };
    const marketGap = ageBuckets.map((bucket) => ({
      bucket,
      entrance: marketItems[0].values[bucket].pct,
      recommend: marketItems[1].values[bucket].pct
    })).sort((a, b) => Math.abs(b.entrance - b.recommend) - Math.abs(a.entrance - a.recommend))[0] || { bucket: "目前樣本", entrance: 0, recommend: 0 };
    return `
      <div class="section-stack">
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">已知妖怪傳說</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${folklorePools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeComparisonMatrix(folkloreItems, groups, folklorePools.totals, { firstColumnTitle: "傳說", note: "以各年齡比例比較", valueColor: () => "var(--gold)" })}
          ${buildAgeTableSummary(summarizeAgeMatrix(folkloreItems, groups, { mode: "folklore" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">核彈歷史知曉比例</div></div></div>
          ${buildAgeNukeCards(nukeItem, groups, groupTotals)}
          ${buildAgeTableSummary(summarizeAgeMatrix([nukeItem], groups, { mode: "nuke" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">喜歡角色比例</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${groupTotals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeHeatmap(roleItems, groups, groupTotals)}
          ${buildAgeTableSummary(summarizeAgeMatrix(roleItems, groups, { mode: "rolePreference" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">最喜歡能力</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${likedPowerPools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeComparisonMatrix(favoritePowerItems, groups, likedPowerPools.totals, { firstColumnTitle: "能力", note: "以各年齡比例比較", valueColor: () => "var(--orange)" })}
          ${buildAgeTableSummary(summarizeAgeMatrix(favoritePowerItems, groups, { mode: "favoritePower" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">最無聊能力</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${boringPowerPools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeComparisonMatrix(boringPowerItems, groups, boringPowerPools.totals, { firstColumnTitle: "能力", note: "以各年齡比例比較", valueColor: () => "var(--gold)" })}
          ${buildAgeTableSummary(summarizeAgeMatrix(boringPowerItems, groups, { mode: "boringPower" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">看不懂能力</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${confusingPowerPools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeComparisonMatrix(confusingPowerItems, groups, confusingPowerPools.totals, { firstColumnTitle: "能力", note: "以各年齡比例比較", valueColor: () => "var(--orange)" })}
          ${buildAgeTableSummary(summarizeAgeMatrix(confusingPowerItems, groups, { mode: "confusingPower" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">劇本喜愛分數</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${scorePools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          <div class="metrics-3">
            ${scoreStats.map((item) => buildMetricCard(item.average, `${item.key} 平均分數`, `中位數 ${item.median}｜n=${item.count}`)).join("")}
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">推薦原因</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${recommendReasonPools.totals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeComparisonMatrix(recommendReasonItems, groups, recommendReasonPools.totals, { firstColumnTitle: "原因", note: "以各年齡比例比較" })}
          ${buildAgeTableSummary(summarizeAgeMatrix(recommendReasonItems, groups, { mode: "recommendReason" }))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">市場反應比較</div></div></div>
          ${buildAgeMarketCards(marketItems, groups, groupTotals)}
          ${buildAgeTableSummary("41–50願意入場率最高，但願意推薦率最低。")}
        </div>
      </div>
    `;
  }

  function renderCross() {
    const rows = currentCrossRows();
    document.getElementById("body-cross").innerHTML = `
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Cross Analysis</div><div class="card-title">交叉分析</div></div></div>
        <div class="seg-tabs" style="margin-bottom:14px">
          <button type="button" class="chip ${state.crossTab === "gender" ? "active" : ""}" data-cross-tab="gender">性別分析</button>
          <button type="button" class="chip ${state.crossTab === "age" ? "active" : ""}" data-cross-tab="age">年齡分析</button>
        </div>
        <div class="filter-row" style="margin-bottom:14px">
          <div class="filter-caption">${state.crossTab === "gender" ? "年齡篩選" : "性別篩選"}</div>
          ${(state.crossTab === "gender" ? ["全部"].concat(ageBuckets) : ["全部", "男", "女"]).map((value) => `
            <button type="button" class="chip ${(state.crossTab === "gender" ? state.crossAge : state.crossGender) === value ? "active" : ""}" data-cross-key="${state.crossTab === "gender" ? "age" : "gender"}" data-cross-value="${value}">${value}</button>
          `).join("")}
        </div>
        <div class="current-filters">
          <span class="current-tag">分析維度：${state.crossTab === "gender" ? "性別" : "年齡"}</span>
          <span class="current-tag">${state.crossTab === "gender" ? `年齡篩選：${state.crossAge}` : `性別篩選：${state.crossGender}`}</span>
          <span class="current-tag">目前樣本：n=${rows.length}</span>
        </div>
      </div>
      ${rows.length ? (state.crossTab === "gender" ? renderGenderCross(rows) : renderAgeCross(rows)) : `<div class="card"><div class="helper">目前篩選條件下沒有樣本。</div></div>`}
    `;
  }

  function renderQualitative() {
    const qualitativeGroups = buildQualitativeGroups();
    const supplementNotes = collectSupplementNotes(respondents);
    const supplementLayout = sortSupplementNotesForLayout(supplementNotes);
    const rowCount = Math.max(qualitativeGroups.positive.length, qualitativeGroups.issues.length);
    const rows = Array.from({ length: rowCount }, (_, index) => ({
      positive: qualitativeGroups.positive[index] || null,
      issue: qualitativeGroups.issues[index] || null
    }));
    document.getElementById("body-qualitative").innerHTML = `
      <div class="qualitative-layout">
        <div class="qualitative-header-row">
          <div class="card qualitative-section">
            <div class="card-head"><div><div class="eyeline">Qualitative</div><div class="card-title">正向回饋</div></div></div>
          </div>
          <div class="card qualitative-section">
            <div class="card-head"><div><div class="eyeline">Qualitative</div><div class="card-title">待修正問題</div></div></div>
          </div>
        </div>
        <div class="qualitative-rows">
          ${rows.map((row) => `
            <div class="qual-row">
              <div class="qual-col">
                ${row.positive ? `<div class="qual-card">${renderQualitativeTopic(row.positive, "positive")}</div>` : `<div class="qualitative-placeholder qual-card"></div>`}
              </div>
              <div class="qual-col">
                ${row.issue ? `<div class="qual-card">${renderQualitativeTopic(row.issue, "issues")}</div>` : `<div class="qualitative-placeholder qual-card"></div>`}
              </div>
            </div>
          `).join("")}
        </div>
        ${supplementNotes.length ? `
        <div class="card" style="margin-top:24px">
          <div class="card-head"><div><div class="eyeline">Question Group <span class="n-tag">補充填答 · n=${supplementNotes.length}</span></div><div class="card-title">補充想法與其他分享</div></div></div>
          <div class="supplement-stack">
            <div class="supplement-grid">
              ${supplementLayout.top.map((note) => `<div class="supplement-card"><div class="supplement-body"><small class="supplement-name">${escapeHtml(note.name)}</small><span>${escapeHtml(note.text)}</span></div></div>`).join("")}
            </div>
            <div class="supplement-grid">
              ${supplementLayout.rest.map((note) => `<div class="supplement-card"><div class="supplement-body"><small class="supplement-name">${escapeHtml(note.name)}</small><span>${escapeHtml(note.text)}</span></div></div>`).join("")}
            </div>
          </div>
        </div>` : ""}
      </div>
    `;
  }

  function bind() {
    document.querySelectorAll("[data-page]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        state.page = this.getAttribute("data-page");
        document.querySelectorAll(".nav-btn").forEach((node) => node.classList.toggle("active", node === this));
        document.querySelectorAll(".page").forEach((node) => node.classList.toggle("active", node.id === `page-${state.page}`));
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll(".expand-btn").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        const wrap = this.closest(".expand");
        wrap.classList.toggle("open");
        const closedLabel = this.getAttribute("data-label-closed") || `展開更多（${this.getAttribute("data-remaining")}則）`;
        const openLabel = this.getAttribute("data-label-open") || "收合";
        this.firstElementChild.textContent = wrap.classList.contains("open") ? openLabel : closedLabel;
        this.lastElementChild.textContent = wrap.classList.contains("open") ? "▲" : "▼";
      });
    });
    document.querySelectorAll("[data-reason-type]").forEach((select) => {
      if (select.dataset.bound) return;
      select.dataset.bound = "1";
      select.addEventListener("change", function () {
        if (this.getAttribute("data-reason-type") === "like") state.reasonLike = this.value;
        else if (this.getAttribute("data-reason-type") === "dislike") state.reasonDislike = this.value;
        else if (this.getAttribute("data-reason-type") === "sequel") state.reasonSequel = this.value;
        renderCharacters();
        bind();
      });
    });
    document.querySelectorAll("[data-open-response-key]").forEach((select) => {
      if (select.dataset.bound) return;
      select.dataset.bound = "1";
      select.addEventListener("change", function () {
        const key = this.getAttribute("data-open-response-key");
        const page = this.getAttribute("data-open-response-page");
        state.openResponseSelection[key] = this.value;
        if (page === "plot") renderPlot();
        else if (page === "reception") renderReception();
        bind();
      });
    });
    document.querySelectorAll("[data-cross-tab]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        state.crossTab = this.getAttribute("data-cross-tab");
        renderCross();
        bind();
      });
    });
    document.querySelectorAll("[data-cross-key]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        if (this.getAttribute("data-cross-key") === "age") state.crossAge = this.getAttribute("data-cross-value");
        else state.crossGender = this.getAttribute("data-cross-value");
        renderCross();
        bind();
      });
    });
  }

  function renderAll() {
    renderNav();
    renderShell();
    renderAudience();
    renderWorldview();
    renderCharacters();
    renderPowers();
    renderPlot();
    renderReception();
    renderCross();
    renderQualitative();
    bind();
  }

  try {
    renderAll();
  } catch (error) {
    console.error(error);
    const panel = document.getElementById("bootError");
    panel.classList.remove("hidden");
    panel.innerHTML = `
      <strong style="display:block;margin-bottom:8px">Dashboard 載入失敗</strong>
      <div style="font-size:14px;line-height:1.7">錯誤訊息：<code>${String(error && error.message ? error.message : error)}</code></div>
    `;
  }
})();
</script></script>
</body>
</html>
