<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《變形者集結：虎姑婆》劇本盲測 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0d;
  --panel:rgba(18,18,24,.88);
  --panel-2:rgba(255,255,255,.035);
  --panel-3:rgba(255,255,255,.024);
  --line:rgba(255,255,255,.08);
  --line-2:rgba(255,255,255,.13);
  --text:#f5f2ea;
  --text-soft:#d8d0c1;
  --muted:#a29b8d;
  --gold:#d7bb7a;
  --orange:#bb7348;
  --blue:#7098c9;
  --green:#76a58c;
  --red:#c96e6c;
  --stone:#8f8679;
  --bronze:#9a8661;
  --teal:#6a9893;
  --plum:#927c90;
  --steel:#7d8890;
  --sand:#b9957a;
  --sage:#97a67f;
  --male:#8ea7cb;
  --female:#dcc48c;
  --c-tiger:#d9bf82;
  --c-bai:#c77946;
  --c-nose:#5f8fca;
  --c-jie:#7eb196;
  --c-boss:#be6965;
  --c-boss-soft:#cc8f88;
  --c-boss-lite:#9fc0ce;
  --shadow:0 28px 64px rgba(0,0,0,.28);
  --radius:22px;
  --radius-sm:16px;
  --max-width:1720px;
  --hero-top:92px;
  --hero-bottom:48px;
  --section-pad:56px;
  --card-pad:28px;
  --grid-gap:32px;
  --stack-gap:32px;
  --fs-body:17px;
  --fs-title:clamp(1.5rem,2.8vw,2.85rem);
  --fs-section:27px;
  --fs-card:20px;
  --fs-label:13px;
  --fs-small:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at top right,rgba(215,187,122,.10),transparent 32%),
    radial-gradient(circle at left 18%,rgba(112,152,201,.08),transparent 28%),
    var(--bg);
  color:var(--text);
  font:300 var(--fs-body)/1.72 "Noto Sans TC",sans-serif;
  letter-spacing:.01em;
  overflow-x:hidden;
}
button{font:inherit}
.shell{padding-bottom:80px}
.hero{
  padding:84px 24px 50px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.hero-inner{
  max-width:var(--max-width);
  width:min(var(--max-width), calc(100vw - 64px));
  margin:0 auto;
  text-align:center;
}
.eyebrow{
  color:var(--gold);
  font:500 12px/1.4 "Noto Sans TC",sans-serif;
  letter-spacing:.24em;
  text-transform:uppercase;
}
.hero h1{
  margin-top:24px;
  font:500 var(--fs-title)/1.12 "Noto Sans TC",sans-serif;
  white-space:nowrap;
}
.hero-sub{
  margin-top:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px 14px;
  color:rgba(255,255,255,.78);
  font-size:18px;
  line-height:1.5;
}
.hero-sub-item{
  display:inline-flex;
  align-items:baseline;
  gap:4px;
  white-space:nowrap;
}
.hero-sub-item strong{
  color:var(--text);
  font-size:1.12em;
  font-weight:700;
}
.hero-sub-divider{
  color:rgba(255,255,255,.22);
  font-size:16px;
}
.hero-sub-final{
  color:rgba(255,255,255,.92);
}
.hero-sub-final strong{
  color:var(--text);
  font-size:1.12em;
}
.hero-sub-final .hero-sub-note{
  color:rgba(255,255,255,.86);
  font-size:.94em;
}
.sticky{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(10,10,13,.76);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sticky-inner{
  max-width:var(--max-width);
  width:min(var(--max-width), calc(100vw - 28px));
  margin:0 auto;
  padding:16px 8px;
  display:flex;
  justify-content:stretch;
}
.nav{
  display:flex;
  justify-content:stretch;
  flex-wrap:wrap;
  gap:12px;
  width:100%;
}
.nav-btn,.chip,.expand-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.026);
  color:var(--muted);
  border-radius:999px;
  cursor:pointer;
  transition:all .16s ease;
  white-space:nowrap;
}
.nav-btn{
  flex:1 1 0;
  min-width:128px;
  padding:14px 20px;
  font-size:16px;
  font-weight:500;
  text-align:center;
  border-width:1.5px;
  border-color:rgba(255,255,255,.2);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.06),
    0 0 0 1px rgba(255,255,255,.04);
}
.chip{
  padding:8px 13px;
  font-size:13px;
}
.nav-btn:hover,.chip:hover,.expand-btn:hover{
  color:var(--text);
  border-color:rgba(255,255,255,.3);
}
.nav-btn.active,.chip.active{
  background:var(--gold);
  border-color:var(--gold);
  color:#111;
  box-shadow:none;
}
.page{
  display:none;
  max-width:var(--max-width);
  margin:0 auto;
  padding:var(--section-pad) 0 0;
  width:min(var(--max-width), calc(100vw - 64px));
}
.page.active{display:block}
.page-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:18px;
  margin-bottom:34px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  width:100%;
}
.page-title{
  font:500 var(--fs-section)/1.18 "Noto Sans TC",sans-serif;
}
.page-sub{
  margin-top:8px;
  color:rgba(255,255,255,.74);
  font-size:15px;
  line-height:1.6;
}
.page-body{
  display:grid;
  gap:var(--stack-gap);
  width:100%;
}
.grid-2,.grid-4{
  display:grid;
  gap:var(--grid-gap);
  align-items:stretch;
}
.layout-2col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--grid-gap);
  align-items:stretch;
}
.layout-2col-visual{
  display:grid;
  grid-template-columns:1.1fr 0.9fr;
  gap:var(--grid-gap);
  align-items:center;
}
.card-grid-4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:var(--grid-gap);
  align-items:stretch;
}
.grid-2{
  grid-template-columns:1fr 1fr;
}
.grid-4{
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
}
.grid-3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:24px;
  align-items:stretch;
}
.supplement-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
  align-items:stretch;
}
.supplement-stack{
  display:grid;
  gap:18px;
}
.supplement-card{
  min-height:0;
  padding:20px 22px;
  border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  font-size:14px;
  line-height:1.7;
  display:flex;
  align-items:flex-start;
}
.supplement-card .supplement-body{
  flex:1 1 auto;
}
.supplement-name{
  display:block;
  margin-bottom:8px;
  color:rgba(224,193,113,.88);
  font-size:12px;
  letter-spacing:.08em;
}
.supplement-card::before{
  content:"";
  width:12px;
  height:12px;
  margin-right:12px;
  border-left:2px solid rgba(224,193,113,.58);
  border-top:2px solid rgba(224,193,113,.58);
  border-top-left-radius:2px;
  flex:0 0 auto;
  margin-top:2px;
}
.supplement-card span{
  flex:1 1 auto;
}
.grid-full{grid-column:1 / -1}
.card{
  position:relative;
  display:flex;
  flex-direction:column;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:var(--card-pad);
  min-height:100%;
  overflow:visible;
}
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  padding:1px;
  background:linear-gradient(140deg,rgba(255,255,255,.10),transparent 36%,rgba(215,187,122,.08));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  mask-composite:exclude;
}
.card > .donut-wrap,
.card > .quad,
.card > .line-panel,
.card > .histogram-panel,
.card > .layout-2col-visual{
  margin-block:auto;
}
.card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:18px;
  min-height:88px;
  flex:0 0 auto;
}
.card-head > div:first-child{
  display:grid;
  align-content:start;
}
.eyeline{
  color:rgba(255,255,255,.78);
  font:600 12px/1.4 "Noto Sans TC",sans-serif;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.n-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:8px;
  padding:4px 8px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.72);
  font:500 11px/1 "Noto Sans TC",sans-serif;
}
.card-title{
  margin-top:6px;
  font-size:var(--fs-card);
  line-height:1.35;
}
.card-note{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}
.card-note strong{color:var(--text-soft);font-weight:500}
.helper{
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:linear-gradient(140deg,rgba(255,255,255,.028),rgba(255,255,255,.018));
  color:var(--text-soft);
  font-size:14px;
  line-height:1.72;
}
.chart-insight{
  padding:10px 14px;
  font-size:15px;
  line-height:1.75;
  color:rgba(255,255,255,.9);
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:8px;
  word-break:keep-all;
  overflow-wrap:normal;
}
.card-footer{
  margin-top:auto;
  padding-top:18px;
}
.card-footer + .card-footer{
  margin-top:0;
  padding-top:12px;
}
.card-footer .helper{
  margin-top:0 !important;
}
.bar-list{display:grid;gap:12px}
.bar-list.scene-bars .bar-row{
  grid-template-columns:minmax(188px,248px) minmax(0,1fr) 52px;
  gap:6px;
}
.bar-list.scene-bars .bar-label{
  white-space:normal;
  line-height:1.3;
  display:block;
  -webkit-line-clamp:unset;
  -webkit-box-orient:unset;
  overflow:hidden;
  max-height:2.6em;
  font-size:13px;
  padding-right:2px;
}
.bar-row{
  display:grid;
  grid-template-columns:minmax(152px,212px) minmax(0,1fr) 52px;
  gap:8px;
  align-items:center;
}
.bar-label{
  color:var(--text);
  font-size:14px;
  text-align:left;
  white-space:normal;
  line-height:1.42;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.bar-label .label-meta{
  font-size:.85em;
  color:rgba(216,208,193,.72);
}
.bar-cell{
  position:relative;
  min-width:0;
}
.track,.bar-wrap{
  position:relative;
  height:26px;
  background:var(--panel-2);
  border-radius:999px;
  overflow:hidden;
  padding-left:0;
}
.fill,.bar-fill{
  height:100%;
  min-width:0;
  max-width:100%;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 10px;
  color:#111;
  font:700 13px/1 "Noto Sans TC",sans-serif;
  font-variant-numeric:tabular-nums;
  margin-left:0;
}
.bar-value{
  min-width:24px;
  padding:2px 6px;
  border-radius:999px;
  background:rgba(255,255,255,.28);
  font-weight:700;
  font-size:14px;
  line-height:1;
  text-align:center;
  letter-spacing:.02em;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
}
.bar-count-outside{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  padding:2px 6px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.94);
  font:700 14px/1 "Noto Sans TC",sans-serif;
  font-variant-numeric:tabular-nums;
  letter-spacing:.02em;
  white-space:nowrap;
  pointer-events:none;
  z-index:2;
}
.fill.zero{
  width:100% !important;
  background:transparent !important;
  border:1px dashed rgba(255,255,255,.08);
  color:var(--muted);
  justify-content:center;
}
.bar-pct{
  text-align:right;
  color:var(--text-soft);
  font:500 12px/1.2 "Noto Sans TC",sans-serif;
  white-space:nowrap;
}
.mini-bars .bar-row{grid-template-columns:140px minmax(0,1fr)}
.mini-bars .bar-pct{display:none}
.donut-wrap{
  display:grid;
  grid-template-columns:minmax(220px,45%) minmax(180px,34%);
  align-items:center;
  justify-content:center;
  gap:18px;
  width:min(100%,560px);
  margin-inline:auto;
}
.donut{
  position:relative;
  width:232px;
  height:232px;
  border-radius:50%;
  justify-self:center;
}
.donut::after{
  content:"";
  position:absolute;
  inset:28px;
  border-radius:50%;
  background:rgba(10,10,13,.92);
  border:1px solid rgba(255,255,255,.05);
}
.donut-center{
  position:absolute;
  inset:0;
  z-index:1;
  display:grid;
  place-items:center;
  text-align:center;
}
.donut-center strong{
  display:block;
  font:700 2.1rem/1 "Noto Sans TC",sans-serif;
  font-variant-numeric:tabular-nums;
}
.donut-center span{
  display:block;
  margin-top:6px;
  font-size:13px;
}
.insight{
  margin-top:16px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.024);
  color:var(--text-soft);
  font-size:14px;
}
.legend{
  display:grid;
  gap:12px;
  min-width:0;
  align-content:center;
}
.legend-row{
  display:grid;
  grid-template-columns:10px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
}
.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}
.legend-label{
  color:var(--text);
  font-size:14px;
  white-space:nowrap;
}
.legend-value{
  color:var(--text-soft);
  font:500 12px/1.2 "Noto Sans TC",sans-serif;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.group-cards{
  display:grid;
  grid-template-columns:repeat(2,minmax(min(100%,320px),1fr));
  gap:var(--grid-gap);
}
.group-card{
  display:flex;
  flex-direction:column;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--panel-3);
  padding:18px;
  min-height:100%;
}
.group-card h4{
  margin-bottom:12px;
  font-size:15px;
  color:var(--text);
}
.quote-list{display:grid;gap:10px}
.quote{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.028);
  color:var(--text-soft);
  font-size:14px;
  line-height:1.7;
}
.quote.response-item{
  display:block;
  padding:14px 16px;
}
.response-item{
  display:block;
}
.response-meta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-right:10px;
  vertical-align:top;
}
.response-name{
  display:inline-flex;
  align-items:center;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.72);
  font-size:12px;
  line-height:1;
  font-weight:500;
  letter-spacing:.01em;
}
.response-text{
  display:block;
  color:rgba(255,255,255,.92);
  font-size:15px;
  line-height:1.75;
}
.plot-open-response .quote.response-item{
  display:block;
}
.plot-open-response .response-text{
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  gap:10px;
  min-width:0;
}
.plot-open-response .response-name{
  flex:0 0 auto;
  margin-top:1px;
}
.plot-open-response .quote-sections{
  display:grid;
  gap:6px;
  margin-top:2px;
  flex:1 1 100%;
  min-width:0;
}
.plot-open-response .quote-section{
  display:grid;
  grid-template-columns:auto minmax(0,1fr);
  gap:8px;
  align-items:start;
}
.plot-open-response .response-text > :not(.response-name):not(.quote-sections){
  flex:1 1 0;
  min-width:0;
}
.qualitative-quotes .quote-list{
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  align-items:stretch;
}
.qualitative-layout{
  display:grid;
  gap:18px;
}
.qualitative-header-row{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:20px;
}
.qualitative-rows{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.qual-row{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:20px;
  align-items:stretch;
}
.qual-col{
  display:flex;
  flex-direction:column;
  min-width:0;
}
.qual-card{
  height:100%;
}
.qualitative-placeholder{
  min-height:100%;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.01);
  opacity:.28;
}
.qualitative-section{
  padding:22px 22px 20px;
}
.qualitative-section .card-head{
  min-height:auto;
  margin-bottom:16px;
  padding-bottom:14px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.qualitative-section .section-stack{
  display:grid;
  gap:16px;
}
.qualitative-topic{
  display:flex;
  flex-direction:column;
  gap:14px;
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.016)),
    rgba(13,14,18,.78);
  padding:18px 20px 16px;
  min-height:auto;
}
.qualitative-topic .theme-head{
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:0;
}
.qualitative-topic .theme-heading{
  min-width:0;
  display:grid;
  gap:4px;
}
.qualitative-topic .theme-kicker{
  color:var(--muted);
  font:500 11px/1.3 "Noto Sans TC",sans-serif;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.qualitative-topic .theme-title{
  font-size:19px;
  line-height:1.45;
  color:var(--text);
}
.qualitative-topic .qualitative-quotes{
  display:grid;
  gap:10px;
}
.qualitative-topic .qualitative-highlight-list,
.qualitative-topic .qualitative-secondary-list{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.qualitative-topic .quote{
  min-height:auto;
  padding:12px 14px;
  border-radius:14px;
  display:flex;
  align-items:flex-start;
  font-size:15px;
  line-height:1.78;
  box-shadow:none;
}
.qualitative-topic .quote.response-item{
  display:grid;
  gap:8px;
  align-content:start;
  padding:14px 16px;
}
.qualitative-topic .quote.highlight{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.026));
  border:1px solid rgba(232,200,122,.22);
  color:var(--text);
}
.qualitative-topic .quote.secondary{
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));
  border:1px solid rgba(255,255,255,.08);
  color:rgba(245,243,236,.9);
}

  function mean(list) {
    return list.length ? list.reduce((sum, value) => sum + value, 0) / list.length : 0;

  function median(list) {
    if (!list.length) return 0;
    const sorted = list.slice().sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
  }

  function trimmedMean(list, trimRate) {
    if (!list.length) return 0;
    const sorted = list.slice().sort((a, b) => a - b);
    const trim = Math.floor(sorted.length * trimRate);
    const trimmed = sorted.slice(trim, sorted.length - trim);
    return mean(trimmed.length ? trimmed : sorted);
  }

    return genreMatchers.map((item) => ({

      count: counts[item.label],

  function toBarData(map, options) {
    const order = options && options.order ? options.order : Object.keys(map);
    const keepOrder = options && options.keepOrder;
    const includeZero = options && options.includeZero;
    let list = order.map((label) => ({
      label,
      count: map[label] || 0,
      color: options && options.colors && options.colors[label] ? options.colors[label] : "var(--gold)"
    }));
    if (!includeZero) list = list.filter((item) => item.count > 0);
    if (!keepOrder) list = list.sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "zh-Hant"));
    return list;
  }

  function fillWidthStyle(count, max, color) {
    if (count === 0) return `width:100%;background:transparent;`;
    const ratio = max ? count / max * 100 : 0;
    const minWidth = Math.max(42, Math.min(22 + Math.max(count - 1, 0) * 6, 52));
    return `width:${ratio}%;background:${color};min-width:${minWidth}px;`;
  }

  function barMinWidth(count) {
    return count > 0 ? Math.max(42, Math.min(22 + Math.max(count - 1, 0) * 6, 52)) : 0;
  }

  function shouldShowBarValueOutside(count, max) {
    const ratio = max ? count / max * 100 : 0;
    return count > 0 && ratio < 18;
  }

  function outsideBarValueStyle(count, max) {
    const ratio = max ? count / max * 100 : 0;
    const minOffset = barMinWidth(count) + 10;
    return `left:max(${minOffset}px, calc(${ratio}% + 10px))`;
  }

  function renderBarValueCell(count, max, color, widthCount, valueLabel, options) {
    const showOutside = shouldShowBarValueOutside(count, max);
    const displayValue = valueLabel == null ? String(count) : String(valueLabel);
    const valueClass = options && options.valueClass ? ` ${options.valueClass}` : "";
    return `
      <div class="bar-cell">
        <div class="track bar-wrap">
          <div class="fill bar-fill ${count === 0 ? "zero" : ""}" style="${fillWidthStyle(widthCount, max, color)}">
            ${showOutside ? "" : `<span class="bar-value${valueClass}">${displayValue}</span>`}
          </div>
        </div>
        ${showOutside ? `<span class="bar-count-outside${valueClass}" style="${outsideBarValueStyle(widthCount, max)}">${displayValue}</span>` : ""}
      </div>
    `;
  }

  function formatBarLabel(label) {
    return String(label)
      .replace(/（([^）]+)）/g, '<span class="label-meta">（$1）</span>')
      .replace(/\(([^)]+)\)/g, '<span class="label-meta">($1)</span>');
  }

  function buildBarRows(items, total, opts) {
    const max = opts && opts.maxCount ? opts.maxCount : Math.max.apply(null, items.map((item) => item.count).concat([1]));
    return `

        ${items.map((item) => {
          return `
        <div class="bar-row">
          <div class="bar-label">${formatBarLabel(item.label)}</div>
          ${renderBarValueCell(item.count, max, item.color, item.count)}
          <div class="bar-pct">${total ? pct(item.count, total) : ""}</div>
        </div>
      `;
        }).join("")}
      </div>
    `;
  }

  function normalizeRecommendReasons(rows) {
    const optionOrder = ["動作場面", "劇情精彩", "情感真摯", "特效程度", "諜報野史", "妖怪傳說", "不推薦", "看完成片才能決定"];
    const grouped = new Map(optionOrder.map((label) => [label, new Set()]));

    function mapReasonToOptions(reason) {
      const text = String(reason || "").trim();
      if (!text) return [];
      if (optionOrder.includes(text) && text !== "看完成片才能決定") return [text];

      if (/(看過後|拍起來|親自看過|才能決定|才能判斷|畫面如何呈現|成敗與拍攝手法|還沒看過|看了覺得|完成片)/.test(text)) {
        return ["看完成片才能決定"];
      }

      const mapped = [];
      if (/(動作場面|好看的動作場面)/.test(text)) mapped.push("動作場面");
      if (/(劇情精彩|精彩的劇情)/.test(text)) mapped.push("劇情精彩");
      if (/(情感真摯|真摯的演員情感|真摯的情感)/.test(text)) mapped.push("情感真摯");
      if (/(特效程度|特效|動畫製作|細膩度)/.test(text)) mapped.push("特效程度");
      if (/(諜報野史)/.test(text)) mapped.push("諜報野史");
      if (/(妖怪傳說|台灣民俗|妖怪|民俗妖怪)/.test(text)) mapped.push("妖怪傳說");
      if (/(不推薦)/.test(text)) mapped.push("不推薦");
      return [...new Set(mapped)];
    }

    rows.forEach((row, index) => {
      const chosen = new Set();
      (row.recommendReasons || []).forEach((reason) => {
        mapReasonToOptions(reason).forEach((label) => chosen.add(label));
      });
      chosen.forEach((label) => {
        if (grouped.has(label)) grouped.get(label).add(index);
      });
    });

    return optionOrder
      .map((label, index) => ({ label, count: grouped.get(label).size, _order: index }))
      .filter((item) => item.count > 0)
      .sort((a, b) => b.count - a.count || a._order - b._order)
      .map(({ _order, ...item }) => item);
  }

  function buildDonut(items, total, centerLabel, focusLabel, options) {
    let current = 0;
    const parts = items.map((item) => {
      const next = current + pctValue(item.count, total) * 3.6;
      const piece = `${item.color} ${current}deg ${next}deg`;
      current = next;
      return piece;
    });
    const top = items.slice().sort((a, b) => b.count - a.count)[0];
    const centerItem = items.find((item) => item.label === focusLabel) || top;
    const centerValue = options && options.centerMode === "count"
      ? `${centerItem ? centerItem.count : 0}`
      : `${centerItem ? pct(centerItem.count, total) : "0.0%"}`;
    const legendValue = (item) => options && options.legendMode === "count"
      ? `${item.count}人`
      : pct(item.count, total);
    const legendMetric = (item) => options && options.legendMetricMode === "count"
      ? `${item.count}人`
      : "";
    return `
      <div class="donut-wrap">
        <div class="donut" style="background:conic-gradient(${parts.join(", ")}, rgba(255,255,255,.04) 0deg 360deg)">
          <div class="donut-center">
            <div>
              <strong style="color:${centerItem ? centerItem.color : "var(--gold)"}">${centerValue}</strong>
              <span style="color:${centerItem ? centerItem.color : "var(--muted)"}">${centerItem ? centerItem.label : centerLabel}</span>
            </div>

            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function buildGenderPreferenceDonutCard(title, counts, groupTotals, options) {
    const opts = options || {};
    const sharedTotal = opts.sharedTotal || 0;
    const maleDenominator = sharedTotal || groupTotals.male || 0;

    const totalPct = items.reduce((sum, item) => sum + item.pct, 0) || 1;
    let current = 0;
    const parts = items.map((item) => {

      const next = current + span;
      const piece = `${item.color} ${current}deg ${next}deg`;

    const centerItem = items.slice().sort((a, b) => b.pct - a.pct || b.count - a.count)[0];

  function buildExpand(quotes, previewCount, options) {
    const preview = quotes.slice(0, previewCount);

    const directShowMax = options && options.directShowMax ? options.directShowMax : null;

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function normalizeQuote(text) {
    return (text || "")
      .replace(/[「」"]/g, "")
      .replace(/\s+/g, "")
      .trim();
  }

  function normalizeResponseItem(item) {
    if (item && typeof item === "object" && !Array.isArray(item)) {
      return {
        name: String(item.name || "").trim(),
        text: String(item.text || "").trim(),
        forceNoSegment: Boolean(item.forceNoSegment)
      };
    }
    return {
      name: "",
      text: String(item || "").trim(),
      forceNoSegment: false
    };
  }

  function responseItemText(item) {
    return normalizeResponseItem(item).text;
  }

  function responseItemName(item) {
    return normalizeResponseItem(item).name;
  }

  function tokenizeQuote(text) {
    const cleaned = normalizeQuote(text);
    const englishTokens = (cleaned.toLowerCase().match(/[a-z0-9]+/g) || []);
    const chineseTokens = [];
    for (let i = 0; i < cleaned.length - 1; i += 1) {
      const pair = cleaned.slice(i, i + 2);
      if (/[\u4e00-\u9fff]{2}/.test(pair)) chineseTokens.push(pair);
    }
    return new Set([...englishTokens, ...chineseTokens]);
  }

  function similarityBetweenQuotes(a, b) {
    const tokensA = tokenizeQuote(a);
    const tokensB = tokenizeQuote(b);
    if (!tokensA.size || !tokensB.size) return 0;
    let shared = 0;
    tokensA.forEach((token) => {
      if (tokensB.has(token)) shared += 1;
    });
    return shared / Math.max(tokensA.size, tokensB.size);
  }

  function dedupeQuotes(quotes) {
    const seen = new Set();
    return quotes.filter((quote) => {
      const key = normalizeQuote(quote);
      if (!key || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function dedupeResponseItems(items) {
    const seen = new Set();
    return (items || []).map(normalizeResponseItem).filter((item) => {
      const key = `${item.name}::${normalizeQuote(item.text)}`;
      if (!item.text || seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function orderItemsByRankedTexts(items, rankedTexts) {
    const queueMap = {};
    dedupeResponseItems(items).forEach((item) => {
      const key = normalizeQuote(item.text);
      if (!queueMap[key]) queueMap[key] = [];
      queueMap[key].push(item);
    });
    const ordered = [];
    rankedTexts.forEach((text) => {
      const key = normalizeQuote(text);
      if (queueMap[key] && queueMap[key].length) ordered.push(queueMap[key].shift());
    });
    Object.values(queueMap).forEach((bucket) => {
      bucket.forEach((item) => ordered.push(item));
    });
    return ordered;
  }

    if (/好鼻師|爛好人|濫好人|太太|女兒|離開隊伍|肥皂劇|太輕鬆|抓走/.test(text)) return topics.findIndex((topic) => topic.id === "nose");
    if (/小潔/.test(text)) return topics.findIndex((topic) => topic.id === "jie");
    return -1;
  }

  function issueFallbackTopicIndex(quote, topics) {
    const text = quote || "";
    if (/單薄|沒有記憶點|推進劇情|革命情感|有跟沒有差不多|特別厲害/.test(text)) return topics.findIndex((topic) => topic.id === "jie");
    if (/最普通|力量型|沒吸引人|隱藏的能力|覺醒|更熱血|無聊/.test(text)) return topics.findIndex((topic) => topic.id === "tiger");
    if (/離開隊伍|肥皂劇|太輕鬆|抓走|爛好人|濫好人/.test(text)) return topics.findIndex((topic) => topic.id === "nose");
    if (/威脅|動機|反派|存在感|功能重點|魅力沒有其他主角強/.test(text)) return topics.findIndex((topic) => topic.id === "villains");
    return topics.findIndex((topic) => topic.id === "villains");
  }

  function groupQualitativeTopics(sourceBuckets, definitions) {
    return Object.keys(definitions).reduce((result, type) => {
      const topics = definitions[type].map((topic) => ({ ...topic, quotes: [] }));
      (sourceBuckets[type] || []).forEach((quote) => {
        let bestIndex = type === "positive" ? positiveFallbackTopicIndex(quote, topics) : issueFallbackTopicIndex(quote, topics);
        if (type === "issues") {
          const overrideIndex = issueOverrideTopicIndex(quote, topics);
          if (overrideIndex >= 0) bestIndex = overrideIndex;
        }
        let bestScore = 0;
        topics.forEach((topic, index) => {
          if (!topic.keywords || !topic.keywords.length) return;
          const score = scoreTopicMatch(quote, topic);
          if (score > bestScore) {
            bestScore = score;
            bestIndex = index;
          }
        });
        topics[bestIndex].quotes.push(quote);
      });
      const filtered = topics.filter((topic) => topic.quotes.length);
      result[type] = type === "issues"
        ? filtered.sort((a, b) => b.quotes.length - a.quotes.length || a.title.localeCompare(b.title, "zh-Hant"))
        : filtered;
      return result;
    }, {});
  }

  function rankQuotesForTopic(topic, quotes) {
    const ranked = quotes.map((quote, index) => {
      const lengthScore = Math.min((quote.length || 0) / 22, 4);
      const keywordScore = scoreTopicMatch(quote, topic);
      const densityScore = /，|；|：|、|\d|場/.test(quote) ? 1.2 : 0;
      const insightScore = /但是|但|因為|所以|應該|覺得|設定|動機|關鍵|不是|太|過於|缺乏|期待|發展性|完整|特色|區隔/.test(quote) ? 1.6 : 0;
      return {
        quote,
        index,
        score: keywordScore * 2.4 + lengthScore + densityScore + insightScore
      };
    }).sort((a, b) => b.score - a.score || b.quote.length - a.quote.length || a.index - b.index);

    const selected = [];
    const remaining = [];
    ranked.forEach((item) => {
      const isNearDuplicate = selected.some((picked) => similarityBetweenQuotes(picked.quote, item.quote) >= 0.58);
      if (selected.length < 3 && !isNearDuplicate) selected.push(item);
      else remaining.push(item);
    });
    while (selected.length < Math.min(3, ranked.length)) {
      const next = remaining.shift();
      if (!next) break;
      selected.push(next);
    }
    const selectedKeys = new Set(selected.map((item) => `${item.index}-${normalizeQuote(item.quote)}`));
    const leftovers = ranked.filter((item) => !selectedKeys.has(`${item.index}-${normalizeQuote(item.quote)}`));
    return [...selected, ...leftovers].map((item) => item.quote);
  }

  function splitHighlightedAndRemaining(quotes) {
    if (quotes.length <= 3) return { highlighted: quotes, directRemainder: [], hidden: [] };
    const highlighted = quotes.slice(0, 3);
    const remaining = quotes.slice(3);
    if (remaining.length <= 1) return { highlighted, directRemainder: remaining, hidden: [] };
    return { highlighted, directRemainder: [], hidden: remaining };
  }

  function normalizeBriefDescriptorQuote(text) {
    return String(text || "")
      .replace(/[「」"]/g, "")
      .replace(/[.…。，、；：!?！？]+$/g, "")
      .trim();
  }

  function isBriefDescriptorQuote(text) {
    const normalized = normalizeBriefDescriptorQuote(text);
    if (!normalized) return false;
    if (normalized.length > 12) return false;
    if (/\n|\/|\d|場\d+|序\d+|p\.\d+|\d+頁/i.test(normalized)) return false;
    if (/[，；：。!?！？]/.test(normalized)) return false;
    if (/因為|所以|但是|而且|如果|覺得|應該|沒有|不是|可以|希望|感覺|設定滿/.test(normalized)) return false;
    return true;
  }

  function condenseBriefDescriptorQuotes(quotes) {
    const grouped = [];
    const descriptorBucket = [];
    const seenDescriptor = new Set();
    quotes.forEach((quote) => {
      if (!isBriefDescriptorQuote(quote)) {
        grouped.push(quote);
        return;
      }
      const normalized = normalizeBriefDescriptorQuote(quote);
      if (!seenDescriptor.has(normalized)) {
        seenDescriptor.add(normalized);
        descriptorBucket.push(normalized);
      }
    });
    if (descriptorBucket.length >= 2) grouped.push(descriptorBucket.join("／"));
    else if (descriptorBucket.length === 1) grouped.push(descriptorBucket[0]);
    return grouped;
  }

  function rankOpenResponseQuotesForTopic(topic, quotes) {
    const ranked = quotes.map((quote, index) => {
      const text = quote || "";
      const keywordScore = scoreTopicMatch(text, topic) + scoreOpenResponseGroup(text, topic) * 0.35;
      const sceneScore = /(場\d+|序\d+|p\.\d+|\d+頁)/.test(text) ? 4.2 : 0;
      const detailScore = /因為|所以|覺得|應該|例如|設定|動機|畫面|場景|段落|轉場|功能|多餘|太快|不清楚|不合理|鋪陳|期待/.test(text) ? 2.8 : 0;
      const densityScore = /，|；|：|\n|、/.test(text) ? 1.4 : 0;
      const lengthScore = Math.min(text.length / 28, 4.5);
      const longPenalty = text.length > 160 ? 8.5 : text.length > 110 ? 6 : text.length > 78 ? 3.5 : 0;
      const linePenalty = text.split(/\n+/).filter(Boolean).length > 2 ? 4 : 0;
      const penalty = /^(無|沒有|還好|都還好|都還ok|沒有特別印象|沒有印象了|不知道|我不知道)$/.test(text) ? 6 : 0;
      return {
        quote,
        index,
        score: keywordScore + sceneScore + detailScore + densityScore + lengthScore - penalty - longPenalty - linePenalty
      };
    }).sort((a, b) => b.score - a.score || b.quote.length - a.quote.length || a.index - b.index);

    const selected = [];
    const remaining = [];
    ranked.forEach((item) => {
      const isNearDuplicate = selected.some((picked) => similarityBetweenQuotes(picked.quote, item.quote) >= 0.58);
      const isCompact = item.quote.length <= 78 && item.quote.split(/\n+/).filter(Boolean).length <= 2;
      if (selected.length < 3 && !isNearDuplicate && isCompact) selected.push(item);
      else remaining.push(item);
    });
    while (selected.length < Math.min(3, ranked.length)) {
      const next = remaining.shift();
      if (!next) break;
      selected.push(next);
    }
    const selectedKeys = new Set(selected.map((item) => `${item.index}-${normalizeQuote(item.quote)}`));
    const leftovers = ranked.filter((item) => !selectedKeys.has(`${item.index}-${normalizeQuote(item.quote)}`));
    return [...selected, ...leftovers].map((item) => item.quote);
  }

  function splitQuoteIntoReadableSections(quote) {
    const text = String(quote || "").trim();
    if (!text) return [];
    const rawParts = text
      .split(/\n+/)
      .flatMap((part) => part.split(/(?<=[。！？；])/))
      .map((part) => part.trim())
      .filter(Boolean);
    if (rawParts.length <= 1 && text.length <= 82) return [];
    const sections = [];
    let buffer = "";
    rawParts.forEach((part) => {
      const candidate = buffer ? `${buffer}${part}` : part;
      if (candidate.length <= 52) {
        buffer = candidate;
      } else {
        if (buffer) sections.push(buffer);
        buffer = part;
      }
    });
    if (buffer) sections.push(buffer);
    return sections.length >= 2 ? sections.slice(0, 6) : [];
  }

  function renderQuoteText(quote, options) {
    const text = responseItemText(quote);
    const segmented = options && options.segmentLong && !normalizeResponseItem(quote).forceNoSegment ? splitQuoteIntoReadableSections(text) : [];
    if (!segmented.length) return `「${escapeHtml(text)}」`;
    return `
      <div class="quote-sections">
        ${segmented.map((part, index) => `
          <div class="quote-section">
            <div class="quote-section-key">${String.fromCharCode(65 + index)}.</div>
            <div class="quote-section-body">${escapeHtml(part)}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderQuoteList(quotes, variant, extraClass, options) {
    if (!quotes.length) return "";
    return `

              ${responseItemName(quote) ? `<span class="response-name">${escapeHtml(responseItemName(quote))}</span>` : ""}

      </div>
    `;
  }

  function renderQualitativeTopic(topic, type) {
    const orderedQuotes = condenseBriefDescriptorQuotes(rankQuotesForTopic(topic, topic.quotes));
    const split = splitHighlightedAndRemaining(orderedQuotes);

  function renderOpenResponseTopic(topic, type, stateKey) {

  function buildQualitativeGroups() {
    const grouped = groupQualitativeTopics(collectQualitativeBuckets(), qualitativeTopicDefinitions);
    return {
      positive: (grouped.positive || []).map((topic) => ({ ...topic, count: topic.quotes.length })),
      issues: (grouped.issues || []).map((topic) => ({ ...topic, count: topic.quotes.length }))
    };
  }

  function comparisonInsight(groupA, groupB, label, impact) {
    if (!groupA || !groupB) return [];
    const top = groupA.pct >= groupB.pct ? groupA : groupB;
    const low = top === groupA ? groupB : groupA;
    const diff = Math.abs(top.pct - low.pct);
    if (diff < 20 && top.pct < 50) return [];
    return [
      `${top.name}在${label}上明顯高於${low.name}（${top.pct.toFixed(1)}% vs ${low.pct.toFixed(1)}%），呈現明顯差異。`
    ];
  }

  function scoreOpenResponseGroup(text, group) {
    if (!text || !group) return 0;
    let score = 0;
    if (group.exact && group.exact.includes(text)) score += 120;
    (group.keywords || []).forEach((keyword) => {
      if (!keyword || !text.includes(keyword)) return;
      score += keyword.length >= 6 ? 6 : keyword.length >= 4 ? 4 : keyword.length >= 2 ? 2 : 1;
    });
    if (score > 0) score += group.priority || 0;
    return score;
  }

  function pickOpenResponseGroup(text, definitions) {
    const source = String(text || "").trim();
    if (!source) return null;
    let bestScore = 0;
    let target = null;
    definitions.forEach((group) => {
      const score = scoreOpenResponseGroup(source, group);
      if (score > bestScore) {
        bestScore = score;
        target = group;
      }
    });
    if (!target) target = definitions.find((group) => group.fallback);
    return target || null;
  }

    if (/結尾|後段|收束/.test(text)) return "結尾段落";
    if (/核彈/.test(text)) return "核彈段落";
    if (/故宮/.test(text)) return "故宮段落";
    if (/基地/.test(text)) return "基地段落";
    if (/整體|未明確|未讀完|無法穩定/.test(text)) return "整體段落";
    return "";
  }

  function getOpenResponseGroupMeta(group, sceneMapItems) {
    const sceneLabels = (sceneMapItems || []).map((item) => item.label);
    const mentionLabels = group.quotes.flatMap((quote) => extractSceneMentions(quote));
    const allLabels = Array.from(new Set(sceneLabels.concat(mentionLabels)));
    let sceneBased = false;
    let anchor = "";
    let sortKey = 999999;

    if (allLabels.length) {
      const sortedLabels = allLabels
        .filter((label) => !isUnreadSceneLabel(label))
        .sort((a, b) => sceneMentionSortValue(a) - sceneMentionSortValue(b) || a.localeCompare(b, "zh-Hant"));
      if (sortedLabels.length) {
        sceneBased = true;
        anchor = summarizeOpenResponseAnchor(sortedLabels[0], sceneMapItems && sceneMapItems[0] ? sceneMapItems[0].detail : "");
        sortKey = sceneMentionSortValue(sortedLabels[0]);
      }
    }

    if (!sceneBased && sceneMapItems && sceneMapItems.length) {
      const fallbackAnchor = summarizeOpenResponseAnchor(sceneMapItems[0].label, sceneMapItems[0].detail);
      if (fallbackAnchor && !/整體段落/.test(fallbackAnchor)) {
        sceneBased = true;
        anchor = fallbackAnchor;
        sortKey = sceneMentionSortValue(fallbackAnchor);
      } else if (fallbackAnchor) {
        anchor = fallbackAnchor;
      }
    }

    if (!anchor && /(整體|未明確|未讀完|無法判斷)/.test(group.title)) anchor = "整體段落";
    const displayTitle = /^expected-/.test(group.id) ? group.title : (anchor ? `${anchor}｜${group.title}` : group.title);
    return { sceneBased, anchor, sortKey, displayTitle };
  }

  function renderSceneCrossReference(items) {
    if (!items || !items.length) return "";
    return `
      <div class="scene-crossref">
        <div class="scene-crossref-title">場次對照</div>
        <div class="scene-crossref-list">
          ${items.map((item) => `
            <div class="scene-crossref-item">
              <div class="scene-crossref-label">${item.label}</div>
              <div class="scene-crossref-detail">${item.detail}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function renderOpenResponseCard(config) {
    const responseItems = config.sourceRows && config.responseField
      ? config.sourceRows.map((row) => ({ name: row.name || "", text: String(row[config.responseField] || "").trim() })).filter((item) => item.text)
      : (config.responses || []).map((text) => ({ name: "", text: String(text || "").trim() })).filter((item) => item.text);
    const rawGrouped = groupOpenResponses(responseItems, config.definitions, config.stateKey);
    const grouped = rawGrouped
      .map((group) => ({
        ...group,
        respondentNames: dedupeNames((group.items || []).map((item) => item.name)),
        ...getOpenResponseGroupMeta(group, config.sceneMap ? config.sceneMap[group.id] : null)
      }))
      .sort((a, b) => {
        if (a.sceneBased !== b.sceneBased) return a.sceneBased ? -1 : 1;
        if (a.sortKey !== b.sortKey) return a.sortKey - b.sortKey;
        return b.quotes.length - a.quotes.length || a.title.localeCompare(b.title, "zh-Hant");
      });
    const total = responseItems.length;
    const barItems = grouped.map((group) => ({
      label: group.displayTitle || group.title,

    }));
    const insight = config.insight ? config.insight(grouped, total) : buildOpenResponseInsight(grouped, total, config.noun || "回覆");
    const currentGroupId = state.openResponseSelection[config.stateKey] || (grouped[0] ? grouped[0].id : "");
    const currentGroup = grouped.find((group) => group.id === currentGroupId) || grouped[0];
    const sceneMap = currentGroup && config.sceneMap ? config.sceneMap[currentGroup.id] : null;
    if (currentGroup && config.stateKey) state.openResponseSelection[config.stateKey] = currentGroup.id;
    return `
      <div class="card ${config.page === "plot" ? "plot-open-response" : ""}">

            <div class="eyeline">Open Response <span class="n-tag">開放題 · n=${total}</span></div>
            <div class="card-title">${config.title}</div>
          </div>
        </div>
        ${buildBarRows(barItems, total, { maxCount: total })}
        ${currentGroup ? `
          <div class="select-wrap" style="margin-top:18px">
            <select class="select-field" data-open-response-key="${config.stateKey}" data-open-response-page="${config.page}">
              ${grouped.map((group) => `<option value="${group.id}" ${group.id === currentGroup.id ? "selected" : ""}>${group.displayTitle || group.title}</option>`).join("")}
            </select>
            ${renderSceneCrossReference(sceneMap)}
            ${renderOpenResponseTopic(currentGroup, config.variant || "issues", config.stateKey)}
          </div>
        ` : ""}
        ${buildChartInsight(insight)}
      </div>
    `;
  }

  function extractSceneMentions(text) {
    const matches = [];
    const scenePattern = /(場\d+(?:[-–~]\d+)?|序\d+|(?:p\.|P\.?)\d+(?:[-–~]\d+)?|\d+頁)/g;
    const chineseScenePattern = /場([一二三四五六七八九十]+)/g;
    const slashScenePattern = /(^|[^\d])(\d{1,3})\s*\/(?=[^\d\/])/g;
    const pairScenePattern = /(^|[^\d])(\d{1,3})\s+(\d{1,3})(?=\s*[^\d])/g;
    const normalized = String(text || "").replace(/\s+/g, " ").trim();
    const chineseNumerals = { "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6, "七": 7, "八": 8, "九": 9, "十": 10 };
    const parseChineseScene = (source) => {
      let total = 0;
      let current = 0;
      Array.from(source || "").forEach((char) => {
        if (char === "十") {
          total += (current || 1) * 10;
          current = 0;
          return;
        }
        current += chineseNumerals[char] || 0;
      });
      return total + current;
    };
    let match;
    while ((match = scenePattern.exec(normalized))) {
      let label = match[1]
        .replace(/P\./g, "p.")
        .replace(/~/g, "-")
        .replace(/–/g, "-");
      if (/^\d+頁$/.test(label)) label = `p.${label.replace("頁", "")}`;
      matches.push(label);
    }
    while ((match = chineseScenePattern.exec(normalized))) {
      const value = parseChineseScene(match[1]);
      if (value > 0) matches.push(`場${value}`);
    }
    while ((match = slashScenePattern.exec(normalized))) {
      matches.push(`場${match[2]}`);
    }
    while ((match = pairScenePattern.exec(normalized))) {
      const start = Number(match[2]);
      const end = Number(match[3]);
      if (Math.abs(end - start) === 1) matches.push(`場${start}-${end}`);
    }
    return Array.from(new Set(matches));
  }

  function extractExpectedSceneMentions(text) {
    const normalized = String(text || "").replace(/\s+/g, " ").trim();
    if (!normalized) return [];
    let labels = extractSceneMentions(normalized);
    const hasScene = labels.some((label) => /^(序\d+|場\d+)/.test(label));
    if (hasScene) labels = labels.filter((label) => !/^p\./i.test(label));

    if (/(蛋糕給虎姑婆|欣欣拿蛋糕)/.test(normalized)) labels.push("場4");
    if (/(場六|場6|p\.19|第19頁|頁碼第19頁|啟動小潔的能力|虎姑婆與小潔互相接觸)/.test(normalized)) labels.push("場6");
    if (/(白賊七啟動能力|好鼻師和白賊七啟動能力|場17|第25頁|頁碼第25頁)/.test(normalized)) labels.push("場17");
    if (/(水蛇說|我兒子才是最適合的|水蛇和水男孩的打鬥|場39 打鬥畫面)/.test(normalized)) labels.push("場39");
    if (/(場41-42|場41–42|跟白賊七重逢|重逢)/.test(normalized)) labels.push("場41-42");
    if (/(44頁|第44頁|駕車逃離水蛇|追打最後驚險逃脫)/.test(normalized)) labels.push("場44");
    if (/(場66|後山基地|基地廊道)/.test(normalized)) labels.push("場66");
    if (/(場70|育幼院成長的故事|將玉珮還給虎姑婆)/.test(normalized)) labels.push("場70");
    if (/(故宮|文物|手稿|場75|場74-75|場74–75|故宮竊取手稿)/.test(normalized)) labels.push("場74-75");
    if (/(場79|監視器都變成局長雙眼|監視器變成局長雙眼)/.test(normalized)) labels.push("場79");
    if (/(場97|場103.?104|103 104|蜥蜴跟白賊七打鬥|蜥蜴跟白賊七對決)/.test(normalized)) labels.push("場97-104");
    if (/(場114.*場136|場114-136|場114–136|大混戰)/.test(normalized)) labels.push("場114-136");
    if (/(局長回憶|閃回局長|古代畫面|125\/局長的回憶|場125)/.test(normalized)) labels.push("場125");
    if (/(狐仙出場|妖狐出世|場137)/.test(normalized)) labels.push("場137");
    if (/(何日君再來|鄧小姐|秘密放螞蟻|p\.1.?p\.2|p\.1-2)/.test(normalized)) labels.push("p.1-2");
    if (/(玉珮吸收核彈|吸收核彈能量|核彈爆發瞬間|最終boss|最終 BOSS)/.test(normalized)) labels.push("場130-137");
    if (/(好鼻師將螞蟻化為盔甲|螞蟻化為盔甲|螞蟻盔甲)/.test(normalized)) labels.push("場74-75");
    if (/(虎姑婆幻化|幻化轉變|虎形打架|變身的順暢動畫)/.test(normalized)) labels.push("場114-136");
    if (/(利用能力戰鬥|特殊能力要呈現|一開始的打鬥畫面|打鬥畫面|動作場景都蠻期待|多數的打鬥畫面)/.test(normalized) && !labels.some((label) => /^場\d+/.test(label))) {
      labels.push("場114-136");
    }
    if (/(幻術與真實場景對比|中了幻術與真實場景對比)/.test(normalized)) labels.push("場19-21");

    return Array.from(new Set(labels))
      .sort((a, b) => sceneMentionSortValue(a) - sceneMentionSortValue(b) || a.localeCompare(b, "zh-Hant"));
  }

  const expectedSceneMapSheetRows = (workbookOpenResponseRows["raw_期待場面"] || [])
    .slice(1)
    .map((row) => String(row.scene || "").trim());

  function extractExpectedSceneMentionsFromSheetMap(text) {
    const normalized = String(text || "")
      .replace(/～/g, "-")
      .replace(/–/g, "-")
      .replace(/\s+/g, " ")
      .trim();
    if (!normalized) return [];
    const collapsed = normalized
      .replace(/序(\d+)\s*-\s*序(\d+)/g, "序$1-$2")
      .replace(/場(\d+)\s*-\s*場(\d+)/g, "場$1-$2");
    const matches = collapsed.match(/序\d+(?:-\d+)?|場\d+(?:-\d+)?|p\.\d+(?:-\d+)?/g) || [];
    return Array.from(new Set(matches))
      .filter((label) => !/^p\./i.test(label))
      .sort((a, b) => sceneMentionSortValue(a) - sceneMentionSortValue(b) || a.localeCompare(b, "zh-Hant"));
  }

  function countSceneMentions(responses, extractor) {
    const counts = {};
    responses.forEach((response) => {
      const labels = extractor ? extractor(response) : extractSceneMentions(response);
      labels.forEach((label) => {
        counts[label] = (counts[label] || 0) + 1;
      });
    });
    return Object.entries(counts)
      .map(([label, count]) => ({ label, count }))
      .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "zh-Hant"));
  }

  function sceneMentionSortValue(label) {
    const text = String(label || "");
    const xu = text.match(/^序(\d+)/);
    if (xu) return Number(xu[1]);
    const scene = text.match(/^場(\d+)/);
    if (scene) return 1000 + Number(scene[1]);
    const page = text.match(/^p\.(\d+)/i);
    if (page) return 2000 + Number(page[1]);
    return 3000;
  }

  function renderSceneMentionLineChart(items, color) {
    const width = 1120;
    const height = 340;
    const pad = { top: 24, right: 28, bottom: 58, left: 62 };
    const innerWidth = width - pad.left - pad.right;
    const innerHeight = height - pad.top - pad.bottom;
    const maxCount = Math.max.apply(null, items.map((item) => item.count).concat([1]));
    const yMax = Math.max(5, Math.ceil(maxCount / 5) * 5);
    const ticks = Array.from({ length: yMax + 1 }, (_, index) => index).filter((value) => value === 0 || value === yMax || value % 5 === 0 || value === maxCount);
    const step = items.length > 1 ? innerWidth / (items.length - 1) : 0;
    const y = (value) => pad.top + innerHeight - value / yMax * innerHeight;
    const points = items.map((item, index) => [pad.left + step * index, y(item.count), item]);
    return `
      <div class="line-panel">
        <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
          <text x="18" y="${pad.top + innerHeight / 2}" fill="var(--text-soft)" font-size="12" writing-mode="vertical-rl" glyph-orientation-vertical="0" text-anchor="middle">提及次數</text>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          <line x1="${pad.left}" y1="${pad.top + innerHeight}" x2="${pad.left + innerWidth}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          ${ticks.map((tick) => `
            <g>
              <line x1="${pad.left}" y1="${y(tick)}" x2="${pad.left + innerWidth}" y2="${y(tick)}" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></line>
              <text x="${pad.left - 10}" y="${y(tick) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${tick}</text>
            </g>
          `).join("")}
          ${points.length > 1 ? `<polyline fill="none" stroke="${color}" stroke-width="3.5" points="${points.map((point) => `${point[0]},${point[1]}`).join(" ")}"></polyline>` : ""}
          ${points.map((point) => `
            <g>
              <circle cx="${point[0]}" cy="${point[1]}" r="7" fill="${color}"></circle>
              <text x="${point[0]}" y="${point[1] - 14}" fill="${color}" font-size="12" text-anchor="middle">${point[2].count}</text>
              <text x="${point[0]}" y="${height - 14}" fill="var(--text-soft)" font-size="11" text-anchor="middle">${point[2].label}</text>
            </g>
          `).join("")}
        </svg>
      </div>
    `;
  }

  function renderSceneMentionCard(config) {
    const countedItems = countSceneMentions(config.responses, config.extractor);
    const items = countedItems
      .slice()
      .sort((a, b) => sceneMentionSortValue(a.label) - sceneMentionSortValue(b.label) || a.label.localeCompare(b.label, "zh-Hant"))
      .slice(0, config.limit || 10);
    if (!items.length) return "";
    const total = config.total || config.responses.length;
    const top = countedItems[0];
    const second = countedItems[1];
    const insight = `${top.label}是最常被點名的場次，占 ${pct(top.count, total)}（${top.count}/${total}）；${second ? `${second.label}次之，占 ${pct(second.count, total)}。` : ""}`;
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="eyeline">Scene Map <span class="n-tag">場次提及 · n=${total}</span></div>
            <div class="card-title">${config.title}</div>
          </div>
        </div>
        ${renderSceneMentionLineChart(items, config.color || "var(--gold)")}
        ${buildChartInsight(insight)}

  }

  function buildMetricCard(value, label, note) {

  function formatSceneLabel(label) {
    if (!label.includes("：")) return label === "沒有時間看完" ? "未讀完" : label;
    const parts = label.split("：");
    const scene = parts[0].trim();
    const desc = parts.slice(1).join("：").replace(/[「」"]/g, "").trim();
    const shortDesc = desc.length > 12 ? `${desc.slice(0, 12)}…` : desc;
    return `#${scene} ${shortDesc}`;
  }

  function formatPlotSceneLabel(label) {
    const text = String(label || "").trim();

    if (text.startsWith("場43：")) return "#場43 小潔說出被囚禁與訓練過往";
    if (text.startsWith("場56：")) return "#場56 小潔說帶我回去就告訴你兒子";

    if (text.includes("讀到虎姑婆記憶")) return "整體段落 讀到記憶後開始產生關聯感";
    return formatSceneLabel(text).replace(/…/g, "");
  }

  function hasPlotAxisSceneLabel(label) {
    return /^(序\d+|場\d+|p\.\d+)/.test(String(label || "").trim());
  }

  function formatPlotAxisTickLabel(label) {
    const text = String(label || "").trim();
    const match = text.match(/^(序\d+|場\d+|p\.\d+)/);
    if (match) return match[1];
    return text === "沒有時間看完" ? "未讀完" : text;
  }

  function isUnreadSceneLabel(label) {
    return label === "沒有時間看完" || label === "未讀完";
  }

  function sortPlotItemsByScriptOrder(items) {
    return items.slice().sort((a, b) => {
      const aUnread = isUnreadSceneLabel(a.label) ? 1 : 0;
      const bUnread = isUnreadSceneLabel(b.label) ? 1 : 0;
      if (aUnread !== bUnread) return aUnread - bUnread;
      return sceneMentionSortValue(a.label) - sceneMentionSortValue(b.label) || a.label.localeCompare(b.label, "zh-Hant");
    });
  }

  function buildPlotLineData(groups) {
    const orderedGroups = groups.map((group) => ({
      ...group,
      items: sortPlotItemsByScriptOrder(group.items).filter((item) => !isUnreadSceneLabel(item.label) && hasPlotAxisSceneLabel(item.label))
    }));
    const ticks = [];
    const seen = new Set();
    orderedGroups.forEach((group) => {
      group.items.forEach((item) => {
        if (!seen.has(item.label)) {
          seen.add(item.label);
          ticks.push(item.label);
        }
      });
    });
    ticks.sort((a, b) => sceneMentionSortValue(a) - sceneMentionSortValue(b) || a.localeCompare(b, "zh-Hant"));
    const series = orderedGroups.map((group) => {
      const itemMap = Object.fromEntries(group.items.map((item) => [item.label, item.count]));
      return {
        name: group.title.replace("關係", "").replace("開始產生情感", "").replace("母子", "母子"),
        color: group.color,
        values: ticks.map((tick) => itemMap[tick] != null ? itemMap[tick] : null)
      };
    });
    const maxY = Math.max(25, ...series.flatMap((seriesItem) => seriesItem.values.filter((value) => value != null)));
    return {
      ticks: ticks.map(formatPlotAxisTickLabel),
      maxY: Math.ceil(maxY / 5) * 5,
      series
    };
  }

  function buildQuadrant(config) {
    const zoneClasses = ["tl", "tr", "bl", "br"];
    const quadWidth = 1000;
    const quadHeight = 420;
    const placedGroups = [];
    const placedByKey = {};
    const reservedBoxes = [
      { x: 0, y: 150, w: 74, h: 118 },
      { x: 926, y: 150, w: 74, h: 118 },
      { x: 428, y: 0, w: 144, h: 54 },
      { x: 448, y: 370, w: 104, h: 50 },
      { x: 18, y: 18, w: 220, h: 44 },
      { x: 780, y: 18, w: 202, h: 44 },
      { x: 18, y: 358, w: 182, h: 44 },
      { x: 790, y: 358, w: 192, h: 44 }
    ];

    function intersects(a, b) {
      return !(a.x + a.w <= b.x || b.x + b.w <= a.x || a.y + a.h <= b.y || b.y + b.h <= a.y);
    }

    function estimateGroupBox(item) {
      const labelWidth = Math.min(210, Math.max(52, item.label.length * 14 + 8));
      const height = Math.max(item.size, 28);
      return {
        width: item.size + 10 + labelWidth,
        height
      };
    }

    function candidateBox(left, centerY, width, height) {
      return {
        x: left,
        y: centerY - height / 2,
        w: width,
        h: height
      };
    }

    function inBounds(box) {
      return box.x >= 18 && box.y >= 18 && box.x + box.w <= quadWidth - 18 && box.y + box.h <= quadHeight - 18;
    }

    function scoreBox(box) {
      let score = 0;
      if (!inBounds(box)) score += 1000;
      reservedBoxes.forEach((reserved) => {
        if (intersects(box, reserved)) score += 400;
      });
      placedGroups.forEach((placed) => {
        if (intersects(box, placed)) score += 700;
      });
      config.items.forEach((other) => {
        const otherX = quadWidth * Math.min(Math.max(other.x, 12), 88) / 100;
        const otherY = quadHeight * Math.min(Math.max(other.y, 12), 88) / 100;
        const otherR = other.size / 2;
        const bubbleBox = { x: otherX - otherR - 6, y: otherY - otherR - 6, w: other.size + 12, h: other.size + 12 };
        if (intersects(box, bubbleBox)) score += 650;
      });
      return score;
    }

    const orderedItems = config.items
      .map((item, index) => ({ ...item, _index: index, _key: `${item.label}__${index}` }))
      .sort((a, b) => b.count - a.count || b.size - a.size || b.label.length - a.label.length || a._index - b._index);

    orderedItems.forEach((item) => {
      const clampedX = Math.min(Math.max(item.x, 12), 88);
      const clampedY = Math.min(Math.max(item.y, 12), 88);
      const centerX = quadWidth * clampedX / 100;
      const centerY = quadHeight * clampedY / 100;
      const radius = item.size / 2;
      const boxSize = estimateGroupBox(item);
      const anchorLeft = centerX - radius;
      const anchorY = centerY;
      const xShifts = [0, -18, -36, -54, -72, -96, -124, -152];
      const yShifts = [0, 12, -12, 24, -24, 36, -36, 48, -48, 60, -60];
      const candidates = [];

      xShifts.forEach((shiftX) => {
        yShifts.forEach((shiftY) => {
          candidates.push(candidateBox(anchorLeft + shiftX, anchorY + shiftY, boxSize.width, boxSize.height));
        });
      });

      let best = candidates[0];
      let bestScore = scoreBox(best);
      candidates.forEach((box) => {
        const score = scoreBox(box);
        if (score < bestScore) {
          best = box;
          bestScore = score;
        }
      });

      placedGroups.push(best);
      placedByKey[item._key] = best;
    });

    return `
      <div class="quad">
        <div class="axis-top">${config.top}</div>
        <div class="axis-bottom">${config.bottom}</div>
        <div class="axis-left">${config.left}</div>
        <div class="axis-right">${config.right}</div>
        ${config.zones.map((zone, index) => `<div class="quad-label ${zoneClasses[index] || "tl"}">${zone.text}</div>`).join("")}
        ${config.items.map((item, index) => {
          const best = placedByKey[`${item.label}__${index}`];
          return `
          <div class="bubble-item" style="left:${(best.x / quadWidth * 100).toFixed(2)}%;top:${(best.y / quadHeight * 100).toFixed(2)}%;height:${best.h}px">
            <div class="bubble" style="width:${item.size}px;height:${item.size}px;background:${item.color}">${item.count}</div>
            <div class="bubble-label">${item.label}</div>
          </div>
        `;
        }).join("")}
      </div>
    `;
  }

  function buildRadar(items, total) {
    const size = 520;
    const cx = 260;
    const cy = 260;
    const radius = 128;
    const labelRadius = radius + 52;
    const angleStep = Math.PI * 2 / items.length;
    const levels = [0.25, 0.5, 0.75, 1];
    const points = items.map((item, index) => {
      const angle = -Math.PI / 2 + angleStep * index;
      const ratio = pctValue(item.count, total) / 100;
      return {
        x: cx + Math.cos(angle) * radius * ratio,
        y: cy + Math.sin(angle) * radius * ratio,
        labelX: cx + Math.cos(angle) * labelRadius,
        labelY: cy + Math.sin(angle) * labelRadius,
        anchor: Math.cos(angle) > 0.35 ? "start" : Math.cos(angle) < -0.35 ? "end" : "middle",
        label: `${item.label} ${pct(item.count, total)}`
      };
    });
    return `
      <svg viewBox="0 0 ${size} ${size}" style="width:100%;max-width:620px;display:block;margin:0 auto;overflow:visible">
        ${levels.map((level) => `
          <polygon fill="none" stroke="rgba(255,255,255,.08)" points="${items.map((_, index) => {
            const angle = -Math.PI / 2 + angleStep * index;
            return `${cx + Math.cos(angle) * radius * level},${cy + Math.sin(angle) * radius * level}`;
          }).join(" ")}"></polygon>
        `).join("")}
        ${items.map((_, index) => {
          const angle = -Math.PI / 2 + angleStep * index;
          return `<line x1="${cx}" y1="${cy}" x2="${cx + Math.cos(angle) * radius}" y2="${cy + Math.sin(angle) * radius}" stroke="rgba(255,255,255,.08)"></line>`;
        }).join("")}
        <polygon fill="rgba(215,187,122,.24)" stroke="var(--gold)" stroke-width="2.5" points="${points.map((point) => `${point.x},${point.y}`).join(" ")}"></polygon>
        ${points.map((point) => `
          <g>
            <circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--gold)"></circle>
            <text x="${point.labelX}" y="${point.labelY}" fill="var(--text-soft)" font-size="12" text-anchor="${point.anchor}" dominant-baseline="middle">${point.label}</text>
          </g>
        `).join("")}
      </svg>
    `;
  }

  function renderLineChart(line) {
    const width = 1120;
    const height = 340;
    const pad = { top: 24, right: 28, bottom: 52, left: 62 };
    const innerWidth = width - pad.left - pad.right;
    const innerHeight = height - pad.top - pad.bottom;
    const step = innerWidth / (line.ticks.length - 1);
    const ticks = [0, 5, 10, 15, 20, 25];
    const y = (value) => pad.top + innerHeight - value / line.maxY * innerHeight;
    return `
      <div class="line-panel">
        <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
          <text x="18" y="${pad.top + innerHeight / 2}" fill="var(--text-soft)" font-size="12" writing-mode="vertical-rl" glyph-orientation-vertical="0" text-anchor="middle">人數</text>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          <line x1="${pad.left}" y1="${pad.top + innerHeight}" x2="${pad.left + innerWidth}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          ${ticks.map((tick) => `
            <g>
              <line x1="${pad.left}" y1="${y(tick)}" x2="${pad.left + innerWidth}" y2="${y(tick)}" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></line>
              <text x="${pad.left - 10}" y="${y(tick) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${tick}</text>
            </g>
          `).join("")}
          ${line.ticks.map((tick, index) => `<text x="${pad.left + step * index}" y="${height - 14}" fill="var(--muted)" font-size="11" text-anchor="middle">${formatPlotAxisTickLabel(tick)}</text>`).join("")}
          ${line.series.map((series) => {
            const points = series.values.map((value, index) => value == null ? null : [pad.left + step * index, y(value), value]).filter(Boolean);
            return `
              <polyline fill="none" stroke="${series.color}" stroke-width="3.5" points="${points.map((point) => `${point[0]},${point[1]}`).join(" ")}"></polyline>
              ${points.map((point) => `
                <g>
                  <circle cx="${point[0]}" cy="${point[1]}" r="5.5" fill="${series.color}"></circle>
                  <text x="${point[0]}" y="${point[1] - 12}" fill="${series.color}" font-size="11" text-anchor="middle">${point[2]}</text>
                </g>
              `).join("")}
            `;
          }).join("")}
        </svg>
      </div>
    `;
  }

  function buildAgeHeatmap(items, ageGroups, groupTotals) {
    return buildAgeComparisonMatrix(items, ageGroups, groupTotals, {
      note: "以各年齡比例比較",
      labelColor: (label) => colorForRole(label),
      peakBackground: (item) => colorForRole(item.label),
      valueColor: (item) => colorForRole(item.label)
    });

  function buildAgeComparisonMatrix(items, ageGroups, groupTotals, options) {
    const opts = options || {};
    return `
      <div class="age-matrix">
        <div class="age-matrix-head">
          <div class="age-matrix-colhead"><strong>${opts.firstColumnTitle || "角色"}</strong></div>
          ${ageGroups.map((group) => `<div class="age-matrix-colhead"><strong>${group.label}</strong><span>n=${groupTotals[group.key] || 0}</span></div>`).join("")}
        </div>
        ${items.map((item) => {
          const counts = ageGroups.map((group) => item.values[group.key].count || 0);
          const pcts = ageGroups.map((group) => item.values[group.key].pct || 0);
          const peak = Math.max.apply(null, pcts);
          return `
          <div class="age-matrix-row ${peak > 0 ? "is-highlight" : ""}">
            <div class="age-matrix-role" style="color:${opts.labelColor ? opts.labelColor(item.label) : "var(--text)"}">${item.label}</div>
            ${ageGroups.map((group, index) => {
              const intensity = pcts[index] / 100;
              const isPeak = pcts[index] === peak && peak > 0;
              const bg = `rgba(255,255,255,${0.02 + intensity * 0.05})`;
              const textColor = isPeak
                ? (opts.peakBackground ? opts.peakBackground(item) : "var(--gold)")
                : "var(--text)";
              const strongColor = opts.valueColor ? opts.valueColor(item, group, isPeak) : textColor;
              return `
              <div class="age-matrix-cell" style="background:${bg};color:${textColor}">
                <div>
                  <strong style="color:${strongColor}">${Math.round(pcts[index])}%</strong>
                  <span style="color:var(--text-soft)">${counts[index]}人</span>
                </div>
              </div>
            `;
            }).join("")}
          </div>

        }).join("")}
      </div>
    `;

  function buildAgeTableSummary(text) {
    return text ? `<div class="age-table-summary">${text}</div>` : "";
  }

  function summarizeGenderComparison(items, options) {
    const opts = options || {};
    const threshold = opts.threshold || 10;
    if (!items || !items.length) return "";
    const ranked = items.map((item) => {
      const malePct = item.values?.male?.pct || 0;
      const femalePct = item.values?.female?.pct || 0;
      return {
        label: item.label,
        malePct,
        femalePct,
        diff: Math.abs(malePct - femalePct),
        higher: malePct >= femalePct ? "男性" : "女性",
        higherPct: Math.max(malePct, femalePct),
        lowerPct: Math.min(malePct, femalePct)
      };
    }).sort((a, b) => b.diff - a.diff);
    const top = ranked[0];
    if (!top || top.diff < threshold) return "";
    const second = ranked[1];
    const lead = `${top.label}的性別差異最明顯，${top.higher}比例較高（${top.higherPct.toFixed(1)}% vs ${top.lowerPct.toFixed(1)}%）。`;
    if (second && second.diff >= threshold) {
      return `${lead}${second.label}也有明顯差異，${second.higher}比例較高。`;
    }
    return lead;
  }

  function summarizeAgeMatrix(items, ageGroups, options) {
    const opts = options || {};
    if (!items.length || !ageGroups.length) return "";

    const averages = ageGroups.map((group) => {
      const values = items.map((item) => item.values[group.key]?.pct || 0);
      const avg = values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0;
      return { key: group.key, label: group.label, avg };
    }).sort((a, b) => b.avg - a.avg);

    const strongest = averages[0];
    const weakest = averages[averages.length - 1];

    if (opts.mode === "folklore") {
      const strongestText = strongest ? `${strongest.label}對整體妖怪傳說熟悉度最高` : "";
      const weakItems = items.map((item) => {
        const ordered = ageGroups.map((group) => ({
          label: group.label,
          pct: item.values[group.key]?.pct || 0
        })).sort((a, b) => a.pct - b.pct);
        return { label: item.label, low: ordered[0] };
      }).filter((item) => weakest && item.low.label === weakest.label).sort((a, b) => a.low.pct - b.low.pct);
      const lowHighlights = weakItems.slice(0, 2).map((item) => item.label).join("和");
      const weakText = weakItems.length
        ? `反而${weakest.label}對${lowHighlights}的知曉比例最低`
        : `${weakest.label}整體知曉比例相對較低`;
      return `${strongestText}；${weakText}。`;
    }

    if (opts.mode === "nuke") {
      const unknowns = ageGroups.map((group) => ({
        label: group.label,
        unknown: 100 - (items[0].values[group.key]?.pct || 0)
      })).sort((a, b) => b.unknown - a.unknown);
      const topUnknown = unknowns[0];
      const secondUnknown = unknowns[1];
      if (!topUnknown) return "";
      if (secondUnknown && topUnknown.unknown - secondUnknown.unknown < 8) {
        return `${topUnknown.label}與${secondUnknown.label}不知道核彈歷史的比例都偏高。`;
      }
      return `${topUnknown.label}不知道核彈歷史的比例最高。`;
    }

    if (opts.mode === "rolePreference") {
      const youngerBuckets = ageGroups.filter((group) => ["21–30", "31–40"].includes(group.label));
      const youngerPreferBaitseven = youngerBuckets.every((group) => {
        const ordered = items
          .map((item) => ({ label: item.label, pct: item.values[group.key]?.pct || 0 }))
          .sort((a, b) => b.pct - a.pct);
        return ordered[0] && ordered[0].label === "白賊七";
      });
      const emotionalRoles = ["虎姑婆", "好鼻師", "小潔"];
      const olderHighlights = items
        .filter((item) => emotionalRoles.includes(item.label))
        .map((item) => ({ label: item.label, pct: item.values["41–50"]?.pct || 0 }))
        .filter((item) => item.pct > 0)
        .sort((a, b) => b.pct - a.pct);

      if (youngerPreferBaitseven && olderHighlights.length >= 2) {
        return `21–30與31–40最偏好白賊七；41–50對虎姑婆、好鼻師與小潔這類情感連結較強的角色相對更喜愛。`;
      }
    }

    if (opts.mode === "favoritePower") {
      const baitsevenCurse = items.find((item) => item.label === "白賊七｜詛咒");
      if (baitsevenCurse) {
        const olderPct = baitsevenCurse.values["41–50"]?.pct || 0;
        const youngPct = baitsevenCurse.values["21–30"]?.pct || 0;
        if (youngPct - olderPct >= 20) {
          return `41–50偏好白賊七「詛咒」能力的比例明顯偏低，顯示不同年齡層的喜好差距。`;
        }
      }
    }

    if (opts.mode === "boringPower") {
      return "21–30明顯高於41–50。";
    }

    if (opts.mode === "confusingPower") {
      return "";
    }

    if (opts.mode === "recommendReason") {
      return "21–30、31–40多數推薦原因為妖怪傳說；41–50則近半數關注動作場面。";
    }

    const spreads = items.map((item) => {
      const ordered = ageGroups.map((group) => ({
        label: group.label,
        pct: item.values[group.key]?.pct || 0
      })).sort((a, b) => b.pct - a.pct);
      return {
        label: item.label,
        high: ordered[0],
        low: ordered[ordered.length - 1],
        gap: ordered[0].pct - ordered[ordered.length - 1].pct
      };
    }).sort((a, b) => b.gap - a.gap);

    const lead = spreads[0];
    if (!lead) return "";
    return `${strongest.label}整體比例最高，${weakest.label}相對較低；差異最大的是${lead.label}，${lead.high.label}明顯高於${lead.low.label}。`;
  }

  function collectSubgroupOptionItems(subgroupRows, subgroupKeys, extractor, options) {
    const opts = options || {};
    const itemsByKey = new Map();
    subgroupKeys.forEach((groupKey) => {
      (subgroupRows[groupKey] || []).forEach((row) => {
        const rawValue = extractor(row);
        const rawValues = Array.isArray(rawValue) ? rawValue : [rawValue];
        const seen = new Set();
        rawValues.forEach((value) => {
          const normalized = opts.normalize ? opts.normalize(value) : String(value || "").trim();
          if (!normalized || seen.has(normalized)) return;
          seen.add(normalized);
          if (!itemsByKey.has(normalized)) {
            itemsByKey.set(normalized, {
              key: normalized,
              label: opts.labelMap ? opts.labelMap(normalized) : normalized,
              values: {}
            });
          }
          const item = itemsByKey.get(normalized);
          if (!item.values[groupKey]) item.values[groupKey] = { count: 0, pct: 0 };
          item.values[groupKey].count += 1;
        });
      });
    });
    return Array.from(itemsByKey.values())
      .map((item) => {
        subgroupKeys.forEach((groupKey) => {
          const total = (subgroupRows[groupKey] || []).length;
          const count = item.values[groupKey] ? item.values[groupKey].count : 0;
          item.values[groupKey] = { count, pct: pctValue(count, total) };
        });
        return item;
      })
      .filter((item) => subgroupKeys.some((groupKey) => (item.values[groupKey].count || 0) > 0))
      .sort((a, b) => {
        const totalA = subgroupKeys.reduce((sum, key) => sum + (a.values[key].count || 0), 0);
        const totalB = subgroupKeys.reduce((sum, key) => sum + (b.values[key].count || 0), 0);
        return totalB - totalA || a.label.localeCompare(b.label, "zh-Hant");
      });
  }

  function filterAnsweredSubgroupRows(subgroupRows, subgroupKeys, predicate) {
    const filteredRows = {};
    subgroupKeys.forEach((key) => {
      filteredRows[key] = (subgroupRows[key] || []).filter((row) => predicate(row));
    });
    return {
      rows: filteredRows,
      totals: Object.fromEntries(subgroupKeys.map((key) => [key, filteredRows[key].length]))
    };
  }

  function formatPowerOptionLabel(label) {
    const meta = splitPowerLabel(label);
    return meta ? `${meta.role}｜${meta.power}` : label;
  }

  function collectScriptScoreStats(subgroupRows, subgroupKeys) {
    return subgroupKeys.map((key) => {
      const scores = (subgroupRows[key] || [])
        .map((row) => Number(row.scriptScore))
        .filter((value) => !Number.isNaN(value) && value > 0);
      return {
        key,
        count: scores.length,
        average: scores.length ? mean(scores).toFixed(2) : "0.00",
        median: scores.length ? String(median(scores)) : "0"
      };
    });
  }

  function keepOnlyItems(items, predicate) {
    return (items || []).filter(predicate);
  }

  function relabelItems(items, labelMap) {
    return (items || []).map((item) => ({
      ...item,
      label: labelMap[item.label] || item.label
    }));
  }

  function buildGenderRoleCards(items, groupTotals) {
    const sorted = items.slice().sort((a, b) => {
      const totalA = (a.values.male.count || 0) + (a.values.female.count || 0);
      const totalB = (b.values.male.count || 0) + (b.values.female.count || 0);
      return totalB - totalA || a.label.localeCompare(b.label, "zh-Hant");
    });
    return `
      <div class="gender-role-grid">
        ${sorted.map((item) => {
          const rows = [
            { key: "male", label: "男", color: genderPalette["男"], count: item.values.male.count || 0 },
            { key: "female", label: "女", color: genderPalette["女"], count: item.values.female.count || 0 }
          ];
          return `
          <div class="theme gender-role-card">
            <div class="theme-head">
              <div>
                <div class="theme-title">${item.label}</div>
              </div>
            </div>
            <div class="gender-role-donuts">
              ${rows.map((row) => `
                <div class="gender-role-donut">
                  <div class="gender-ratio-label ${row.key}">${row.label}生比例</div>

                  ], groupTotals[row.key], `${row.label}生`, `${row.count}人`)}
                </div>
              `).join("")}
            </div>
          </div>
        `;
        }).join("")}
      </div>

  }

      { key: "male", label: "男", color: genderPalette["男"], count: item.values.male.count || 0 },

  function buildAgeNukeCards(item, ageGroups, groupTotals) {

                  ${buildDonut([

  function buildAgeMarketCards(items, ageGroups, groupTotals) {
    return `

  function sequelResponseSupportsLabel(row, label) {
    const text = String(row && row.sequel || "").trim();
    if (!text || !label) return false;
    if (row && row.name === "吳幼雯" && /不會/.test(text) && /續集與外傳/.test(text)) {
      return false;
    }
    if (row && row.name === "宋昆銘" && /詛咒之力/.test(text)) {
      return label === "白賊七";
    }
    if (row && row.name === "李艷娟" && /會期待外傳/.test(text) && /對於主角沒有什麼特別的想法/.test(text)) {
      return label === "其他（前傳／外傳）";
    }
    if (row && row.name === "丁展譽" && /好鼻師的女兒覺醒後的發展/.test(text)) {
      if (label === "其他（前傳／外傳）") return true;
      if (label === "好鼻師") return false;
    }
    if (label === "其他（前傳／外傳）") {
      return /外傳|前傳|遇見局長前|妖怪們遇見局長前/.test(text);
    }
    if (row && row.name === "林哲毅" && /給虎姑婆一個完整的故事跟戀愛曲線/.test(text)) {
      if (label === "虎姑婆") return true;
      if (label === "狐仙") return false;
    }
    if (row && row.name === "廖元維" && label === "虎姑婆" && /小潔很適合當主角/.test(text)) {
      return false;
    }
    return text.includes(label);
  }
