<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《變形者集結：虎姑婆》劇本盲測 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0d;
  --panel:rgba(18,18,24,.88);
  --panel-2:rgba(255,255,255,.035);
  --panel-3:rgba(255,255,255,.024);
  --line:rgba(255,255,255,.08);
  --line-2:rgba(255,255,255,.13);
  --text:#f5f2ea;
  --text-soft:#d8d0c1;
  --muted:#a29b8d;
  --gold:#d7bb7a;
  --orange:#bb7348;
  --blue:#7098c9;
  --green:#76a58c;
  --red:#c96e6c;
  --stone:#8f8679;
  --male:#8ea7cb;
  --female:#dcc48c;
  --c-tiger:#d9bf82;
  --c-bai:#c77946;
  --c-nose:#5f8fca;
  --c-jie:#7eb196;
  --c-boss:#be6965;
  --c-boss-soft:#cc8f88;
  --c-boss-lite:#9fc0ce;
  --shadow:0 28px 64px rgba(0,0,0,.28);
  --radius:22px;
  --radius-sm:16px;
  --max-width:1720px;
  --hero-top:92px;
  --hero-bottom:48px;
  --section-pad:56px;
  --card-pad:28px;
  --grid-gap:32px;
  --stack-gap:32px;
  --fs-body:17px;
  --fs-title:clamp(1.5rem,2.8vw,2.85rem);
  --fs-section:27px;
  --fs-card:20px;
  --fs-label:13px;
  --fs-small:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at top right,rgba(215,187,122,.10),transparent 32%),
    radial-gradient(circle at left 18%,rgba(112,152,201,.08),transparent 28%),
    var(--bg);
  color:var(--text);
  font:300 var(--fs-body)/1.72 "Noto Sans TC",sans-serif;
  letter-spacing:.01em;
  overflow-x:hidden;
}
button{font:inherit}
.shell{padding-bottom:80px}
.hero{
  padding:72px 24px 40px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.hero-inner{
  max-width:var(--max-width);
  width:min(var(--max-width), calc(100vw - 64px));
  margin:0 auto;
  text-align:center;
}
.eyebrow{
  color:var(--gold);
  font:400 12px/1.4 "Space Mono",monospace;
  letter-spacing:.24em;
  text-transform:uppercase;
}
.hero h1{
  margin-top:18px;
  font:400 var(--fs-title)/1.08 "Noto Serif TC",serif;
  white-space:nowrap;
}
.hero-sub{
  margin-top:14px;
  color:var(--muted);
  font-size:14px;
}
.sticky{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(10,10,13,.76);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sticky-inner{
  max-width:var(--max-width);
  width:min(var(--max-width), calc(100vw - 64px));
  margin:0 auto;
  padding:14px 24px;
  display:flex;
  justify-content:center;
}
.nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
}
.nav-btn,.chip,.expand-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.026);
  color:var(--muted);
  border-radius:999px;
  cursor:pointer;
  transition:all .16s ease;
  white-space:nowrap;
}
.nav-btn{
  padding:10px 16px;
  font-size:14px;
}
.chip{
  padding:8px 13px;
  font-size:13px;
}
.nav-btn:hover,.chip:hover,.expand-btn:hover{color:var(--text);border-color:var(--line-2)}
.nav-btn.active,.chip.active{
  background:var(--gold);
  border-color:var(--gold);
  color:#111;
}
.page{
  display:none;
  max-width:var(--max-width);
  margin:0 auto;
  padding:var(--section-pad) 0 0;
  width:min(var(--max-width), calc(100vw - 64px));
}
.page.active{display:block}
.page-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:18px;
  margin-bottom:34px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  width:100%;
}
.page-title{
  font:400 var(--fs-section)/1.12 "Noto Serif TC",serif;
}
.page-sub{
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
}
.page-body{
  display:grid;
  gap:var(--stack-gap);
  width:100%;
}
.grid-2,.grid-4{
  display:grid;
  gap:var(--grid-gap);
  align-items:stretch;
}
.layout-2col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--grid-gap);
  align-items:stretch;
}
.layout-2col-visual{
  display:grid;
  grid-template-columns:1.1fr 0.9fr;
  gap:var(--grid-gap);
  align-items:center;
}
.card-grid-4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:var(--grid-gap);
  align-items:stretch;
}
.grid-2{
  grid-template-columns:1fr 1fr;
}
.grid-4{
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
}
.grid-3{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:24px;
  align-items:stretch;
}
.grid-full{grid-column:1 / -1}
.card{
  position:relative;
  display:flex;
  flex-direction:column;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:var(--card-pad);
  min-height:100%;
  overflow:visible;
}
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  padding:1px;
  background:linear-gradient(140deg,rgba(255,255,255,.10),transparent 36%,rgba(215,187,122,.08));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  mask-composite:exclude;
}
.card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:18px;
  min-height:88px;
  flex:0 0 auto;
}
.card-head > div:first-child{
  display:grid;
  align-content:start;
}
.eyeline{
  color:#c7bfb2;
  font:400 12px/1.4 "Space Mono",monospace;
  letter-spacing:.18em;
  text-transform:uppercase;
}
.n-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:8px;
  padding:4px 8px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font:400 11px/1 "Space Mono",monospace;
}
.card-title{
  margin-top:6px;
  font-size:var(--fs-card);
  line-height:1.35;
}
.card-note{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}
.card-note strong{color:var(--text-soft);font-weight:500}
.helper{
  padding:14px 16px;
  border-radius:14px;
  border:1px solid var(--line);
  background:linear-gradient(140deg,rgba(255,255,255,.028),rgba(255,255,255,.018));
  color:var(--text-soft);
  font-size:14px;
  line-height:1.72;
}
.card-footer{
  margin-top:auto;
  padding-top:18px;
}
.card-footer .helper{
  margin-top:0 !important;
}
.bar-list{display:grid;gap:12px}
.bar-row{
  display:grid;
  grid-template-columns:minmax(180px,240px) minmax(0,1fr) 52px;
  gap:8px;
  align-items:center;
}
.bar-label{
  color:var(--text);
  font-size:14px;
  text-align:left;
  white-space:normal;
  line-height:1.42;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.bar-label .label-meta{
  font-size:.85em;
  color:rgba(216,208,193,.72);
}
.bar-cell{
  position:relative;
  min-width:0;
}
.track,.bar-wrap{
  position:relative;
  height:26px;
  background:var(--panel-2);
  border-radius:999px;
  overflow:hidden;
  padding-left:0;
}
.fill,.bar-fill{
  height:100%;
  min-width:0;
  max-width:100%;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 10px;
  color:#111;
  font:700 12px/1 "Space Mono",monospace;
  margin-left:0;
}
.bar-value{
  min-width:20px;
  font-weight:600;
  font-size:13px;
}
.bar-count-outside{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:var(--text);
  font:700 12px/1 "Space Mono",monospace;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  pointer-events:none;
  z-index:2;
}
.fill.zero{
  width:100% !important;
  background:transparent !important;
  border:1px dashed rgba(255,255,255,.08);
  color:var(--muted);
  justify-content:center;
}
.bar-pct{
  text-align:right;
  color:var(--text-soft);
  font:400 12px/1.2 "Space Mono",monospace;
  white-space:nowrap;
}
.mini-bars .bar-row{grid-template-columns:140px minmax(0,1fr)}
.mini-bars .bar-pct{display:none}
.donut-wrap{
  display:grid;
  grid-template-columns:minmax(220px,45%) minmax(180px,34%);
  align-items:center;
  justify-content:center;
  gap:18px;
  width:min(100%,560px);
  margin-inline:auto;
}
.donut{
  position:relative;
  width:232px;
  height:232px;
  border-radius:50%;
  justify-self:center;
}
.donut::after{
  content:"";
  position:absolute;
  inset:28px;
  border-radius:50%;
  background:rgba(10,10,13,.92);
  border:1px solid rgba(255,255,255,.05);
}
.donut-center{
  position:absolute;
  inset:0;
  z-index:1;
  display:grid;
  place-items:center;
  text-align:center;
}
.donut-center strong{
  display:block;
  font:700 2.1rem/1 "Space Mono",monospace;
  font-variant-numeric:tabular-nums;
}
.donut-center span{
  display:block;
  margin-top:6px;
  font-size:13px;
}
.insight{
  margin-top:16px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.024);
  color:var(--text-soft);
  font-size:14px;
}
.legend{
  display:grid;
  gap:12px;
  min-width:0;
  align-content:center;
}
.legend-row{
  display:grid;
  grid-template-columns:10px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
}
.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}
.legend-label{
  color:var(--text);
  font-size:14px;
  white-space:nowrap;
}
.legend-value{
  color:var(--text-soft);
  font:400 12px/1.2 "Space Mono",monospace;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.group-cards{
  display:grid;
  grid-template-columns:repeat(2,minmax(min(100%,320px),1fr));
  gap:var(--grid-gap);
}
.group-card{
  display:flex;
  flex-direction:column;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--panel-3);
  padding:18px;
  min-height:100%;
}
.group-card h4{
  margin-bottom:12px;
  font-size:15px;
  color:var(--text);
}
.quote-list{display:grid;gap:10px}
.quote{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.028);
  color:var(--text-soft);
  font-size:14px;
  line-height:1.7;
}
.qualitative-quotes .quote-list{
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  align-items:stretch;
}
.qualitative-quotes .quote{
  min-height:92px;
  display:flex;
  align-items:flex-start;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  box-shadow:none;
}
.qualitative-section .section-stack{
  gap:18px;
}
.qualitative-topic{
  display:flex;
  flex-direction:column;
  gap:10px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  background:rgba(255,255,255,.018);
  padding:16px 18px;
  min-height:auto;
}
.qualitative-topic .theme-head{
  gap:12px;
  margin-bottom:8px;
}
.qualitative-topic .theme-title{
  font-size:17px;
  line-height:1.42;
}
.qualitative-topic .qualitative-quotes{
  display:grid;
  gap:8px;
}
.qualitative-topic .qualitative-quotes .quote-list{
  gap:10px 12px;
}
.qualitative-topic .qualitative-quotes .quote{
  min-height:68px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.016);
  border:1px solid rgba(255,255,255,.05);
  align-items:center;
}
.qualitative-topic .expand{
  margin-top:6px;
}
.qualitative-topic .expand-btn{
  width:auto;
  justify-content:flex-start;
  padding:6px 0;
  border:none;
  border-radius:0;
  background:transparent;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.qualitative-topic .expand.open .expand-btn{
  color:var(--text-soft);
}
.qualitative-topic .expand-body{
  margin-top:8px;
}
.theme-grid{display:grid;gap:14px}
.theme{
  display:flex;
  flex-direction:column;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--panel-3);
  padding:18px 20px;
  min-height:100%;
}
.linked-detail{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.08);
}
.linked-title{
  margin:0 0 12px;
  color:var(--text);
  font-size:14px;
  line-height:1.4;
}
.role-opinion-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:stretch;
}
.role-opinion-card{
  display:flex;
  flex-direction:column;
}
.role-chart-section{
  height:436px;
  display:grid;
  align-content:start;
}
.role-reason-section{
  margin-top:0;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.08);
  display:grid;
  align-content:start;
  gap:12px;
}
.role-card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:var(--grid-gap);
}
.gender-role-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:20px;
  align-items:stretch;
}
.gender-role-card{
  min-height:220px;
}
.gender-role-stack{
  display:grid;
  gap:12px;
}
.gender-role-row{
  display:grid;
  grid-template-columns:40px minmax(0,1fr) 92px;
  gap:10px;
  align-items:center;
}
.gender-role-key{
  text-align:center;
  font:700 12px/1 "Space Mono",monospace;
}
.gender-role-total{
  margin-top:2px;
  color:var(--text-soft);
  font:400 12px/1.2 "Space Mono",monospace;
  font-variant-numeric:tabular-nums;
}
.role-metric-note{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}
.role-metric-list{
  display:grid;
  gap:12px;
}
.role-metric-row{
  display:grid;
  grid-template-columns:104px minmax(0,1fr) 70px;
  gap:10px;
  align-items:center;
}
.role-metric-label{
  color:var(--text);
  font-size:13px;
  white-space:nowrap;
}
.role-card-subtitle{
  font-size:18px;
  line-height:1.42;
  color:var(--text);
}
.role-metric-value{
  text-align:right;
  color:var(--text-soft);
  font:400 12px/1.2 "Space Mono",monospace;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.theme-head{
  display:flex;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.theme-count{
  flex:0 0 auto;
  padding:4px 10px;
  border-radius:999px;
  font:700 12px/1 "Space Mono",monospace;
}
.theme-count.issue{background:rgba(201,110,108,.14);color:var(--red);border:1px solid rgba(201,110,108,.24)}
.theme-count.good{background:rgba(118,165,140,.14);color:var(--green);border:1px solid rgba(118,165,140,.24)}
.theme-title{
  font-size:18px;
  line-height:1.42;
}
.expand{
  margin-top:14px;
}
.expand-btn{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.02);
}
.expand.open .expand-btn{color:var(--text)}
.expand-body{display:none;margin-top:12px}
.expand.open .expand-body{display:block}
.cross-filter,.seg-tabs,.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.03);
}
.filter-caption{
  width:100%;
  color:var(--muted);
  font:400 12px/1.3 "Space Mono",monospace;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.quad{
  position:relative;
  height:420px;
  border-radius:20px;
  border:1px solid var(--line);
  background:
    linear-gradient(90deg,rgba(255,255,255,.018) 49.7%,rgba(255,255,255,.10) 49.7%,rgba(255,255,255,.10) 50.3%,rgba(255,255,255,.018) 50.3%),
    linear-gradient(180deg,rgba(255,255,255,.018) 49.7%,rgba(255,255,255,.10) 49.7%,rgba(255,255,255,.10) 50.3%,rgba(255,255,255,.018) 50.3%);
  overflow:hidden;
}
.axis-top,.axis-bottom,.axis-left,.axis-right,.quad-label{
  position:absolute;
  color:#ffffff;
  font-size:13px;
}
.axis-top{top:24px;left:50%;transform:translateX(-50%)}
.axis-bottom{bottom:24px;left:50%;transform:translateX(-50%)}
.axis-left{
  top:50%;
  left:24px;
  transform:translateY(-50%);
  writing-mode:vertical-rl;
  text-orientation:mixed;
}
.axis-right{
  top:50%;
  right:24px;
  transform:translateY(-50%);
  writing-mode:vertical-rl;
  text-orientation:mixed;
  text-align:right;
}
.quad-label{
  color:rgba(255,255,255,.78);
  font-size:14px;
  font-weight:600;
}
.quad-label.tl{top:24px;left:24px;text-align:left}
.quad-label.tr{top:24px;right:24px;text-align:right}
.quad-label.bl{bottom:24px;left:24px;text-align:left}
.quad-label.br{bottom:24px;right:24px;text-align:right}
.bubble{
  position:absolute;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px solid rgba(255,255,255,.18);
  display:grid;
  place-items:center;
  color:#111;
  font:700 12px/1 "Space Mono",monospace;
}
.bubble-label{
  position:absolute;
  color:#fff;
  font-size:13px;
  line-height:1.2;
  white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.45);
  transform:translateY(-50%);
}
.bubble-label.pos-right{
  text-align:left;
}
.bubble-label.pos-right-up{
  text-align:left;
  transform:translateY(-100%);
}
.bubble-label.pos-right-down{
  text-align:left;
  transform:translateY(0);
}
.bubble-label.pos-left{
  text-align:right;
  transform:translate(-100%,-50%);
}
.line-panel{
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(255,255,255,.02);
  padding:18px 18px 12px;
}
.line-panel svg{width:100%;display:block;overflow:visible}
.line-legend{
  margin-top:14px;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}
.score-grid{
  display:grid;
  grid-template-columns:repeat(10,minmax(0,1fr));
  gap:10px;
  align-items:end;
  min-height:176px;
}
.histogram-panel{
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(255,255,255,.02);
  padding:18px 18px 12px;
}
.histogram-panel svg{
  width:100%;
  display:block;

    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
  }

  function trimmedMean(list, trimRate) {
    if (!list.length) return 0;
    const sorted = list.slice().sort((a, b) => a - b);
    const trim = Math.floor(sorted.length * trimRate);
    const trimmed = sorted.slice(trim, sorted.length - trim);
    return mean(trimmed.length ? trimmed : sorted);
  }

  function countSingle(list, key, transform) {
    const map = {};
    list.forEach((row) => {
      const value = transform ? transform(row[key], row) : row[key];
      if (value == null) return;
      map[value] = (map[value] || 0) + 1;
    });
    return map;
  }

  function countMulti(list, key) {
    const map = {};
    list.forEach((row) => {
      (row[key] || []).forEach((value) => {
        map[value] = (map[value] || 0) + 1;
      });
    });
    return map;
  }

  function colorForRole(label) {
    if (fixedRoleColors[label]) return fixedRoleColors[label];
    if (["蜥蜴", "水蛇", "水男孩", "水蛇、水男孩", "水蛇 / 水男孩"].includes(label)) return "var(--c-boss-soft)";
    return rolePalette[label] || "#b9b2a6";
  }

  function roleTone(role, alpha) {
    const tones = {
      "白賊七": `rgba(199,121,70,${alpha})`,
      "虎姑婆": `rgba(217,191,130,${alpha})`,
      "好鼻師": `rgba(95,143,202,${alpha})`,
      "小潔": `rgba(126,177,150,${alpha})`
    };
    return tones[role] || `rgba(185,178,166,${alpha})`;
  }

  function buildPage(section) {
    return `
      <section class="page ${section.id === state.page ? "active" : ""}" id="page-${section.id}">
        <div class="page-head">
          <div>
            <div class="page-title">${section.title}</div>
            <div class="page-sub">${section.subtitle}</div>
          </div>
        </div>
        <div class="page-body" id="body-${section.id}"></div>
      </section>
    `;
  }

  function renderNav() {
    nav.innerHTML = sections.map((section) => `
      <button type="button" class="nav-btn ${section.id === state.page ? "active" : ""}" data-page="${section.id}">${section.label}</button>
    `).join("");
  }

  function renderShell() {
    app.innerHTML = sections.map(buildPage).join("");
  }

  function toBarData(map, options) {
    const order = options && options.order ? options.order : Object.keys(map);
    const keepOrder = options && options.keepOrder;
    const includeZero = options && options.includeZero;
    let list = order.map((label) => ({
      label,
      count: map[label] || 0,
      color: options && options.colors && options.colors[label] ? options.colors[label] : "var(--gold)"
    }));
    if (!includeZero) list = list.filter((item) => item.count > 0);
    if (!keepOrder) list = list.sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "zh-Hant"));
    return list;
  }

  function fillWidthStyle(count, max, color) {
    if (count === 0) return `width:100%;background:transparent;`;
    const ratio = max ? count / max * 100 : 0;
    const minWidth = Math.min(20 + Math.max(count - 1, 0) * 5, 42);
    return `width:${ratio}%;background:${color};min-width:${minWidth}px;`;
  }

  function barMinWidth(count) {
    return count > 0 ? Math.min(20 + Math.max(count - 1, 0) * 5, 42) : 0;
  }

  function shouldShowBarValueOutside(count, max) {
    const ratio = max ? count / max * 100 : 0;
    return count > 0 && ratio < 18;
  }

  function outsideBarValueStyle(count, max) {
    const ratio = max ? count / max * 100 : 0;
    const minOffset = barMinWidth(count) + 10;
    return `left:max(${minOffset}px, calc(${ratio}% + 10px))`;
  }

  function renderBarValueCell(count, max, color, widthCount, valueLabel) {
    const showOutside = shouldShowBarValueOutside(count, max);
    const displayValue = valueLabel == null ? String(count) : String(valueLabel);
    return `
      <div class="bar-cell">
        <div class="track bar-wrap">
          <div class="fill bar-fill ${count === 0 ? "zero" : ""}" style="${fillWidthStyle(widthCount, max, color)}">
            ${showOutside ? "" : `<span class="bar-value">${displayValue}</span>`}
          </div>
        </div>
        ${showOutside ? `<span class="bar-count-outside" style="${outsideBarValueStyle(widthCount, max)}">${displayValue}</span>` : ""}
      </div>
    `;
  }

  function formatBarLabel(label) {
    return String(label)
      .replace(/（([^）]+)）/g, '<span class="label-meta">（$1）</span>')
      .replace(/\(([^)]+)\)/g, '<span class="label-meta">($1)</span>');
  }

  function buildBarRows(items, total, opts) {
    const max = opts && opts.maxCount ? opts.maxCount : Math.max.apply(null, items.map((item) => item.count).concat([1]));
    return `
      <div class="bar-list ${opts && opts.mini ? "mini-bars" : ""}">
        ${items.map((item) => {
          return `
        <div class="bar-row">
          <div class="bar-label">${formatBarLabel(item.label)}</div>
          ${renderBarValueCell(item.count, max, item.color, item.count)}
          <div class="bar-pct">${total ? pct(item.count, total) : ""}</div>
        </div>
      `;
        }).join("")}
      </div>
    `;
  }

  function buildDonut(items, total, centerLabel, focusLabel) {
    let current = 0;
    const parts = items.map((item) => {
      const next = current + pctValue(item.count, total) * 3.6;
      const piece = `${item.color} ${current}deg ${next}deg`;
      current = next;
      return piece;
    });
    const top = items.slice().sort((a, b) => b.count - a.count)[0];
    const centerItem = items.find((item) => item.label === focusLabel) || top;
    return `
      <div class="donut-wrap">
        <div class="donut" style="background:conic-gradient(${parts.join(", ")}, rgba(255,255,255,.04) 0deg 360deg)">
          <div class="donut-center">
            <div>
              <strong style="color:${centerItem ? centerItem.color : "var(--gold)"}">${centerItem ? pct(centerItem.count, total) : "0.0%"}</strong>
              <span style="color:${centerItem ? centerItem.color : "var(--muted)"}">${centerItem ? centerItem.label : centerLabel}</span>
            </div>
          </div>
        </div>
        <div class="legend">
          ${items.map((item) => `
            <div class="legend-row">
              <span class="legend-dot" style="background:${item.color}"></span>
              <span class="legend-label">${item.label}</span>
              <span class="legend-value">${pct(item.count, total)}</span>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function buildExpand(quotes, previewCount, options) {
    const preview = quotes.slice(0, previewCount);
    const remain = quotes.slice(previewCount);
    const directShowMax = options && options.directShowMax ? options.directShowMax : null;
    if ((directShowMax != null && quotes.length <= directShowMax) || remain.length <= 1) {
      return `<div class="quote-list">${quotes.map((quote) => `<div class="quote">「${quote}」</div>`).join("")}</div>`;
    }
    return `
      <div class="quote-list">${preview.map((quote) => `<div class="quote">「${quote}」</div>`).join("")}</div>
      <div class="expand">
        <button type="button" class="expand-btn" data-remaining="${remain.length}">
          <span>展開更多（${remain.length}則）</span>
          <span>▼</span>
        </button>
        <div class="expand-body">
          <div class="quote-list">${remain.map((quote) => `<div class="quote">「${quote}」</div>`).join("")}</div>
        </div>
      </div>
    `;
  }

  function buildInsight(lines) {
    return lines && lines.length ? `<div class="insight">${lines.join("<br>")}</div>` : "";
  }

  function comparisonInsight(groupA, groupB, label, impact) {
    if (!groupA || !groupB) return [];
    const top = groupA.pct >= groupB.pct ? groupA : groupB;
    const low = top === groupA ? groupB : groupA;
    const diff = Math.abs(top.pct - low.pct);
    if (diff < 20 && top.pct < 50) return [];
    return [
      `${top.name}在${label}上明顯高於${low.name}（${top.pct.toFixed(1)}% vs ${low.pct.toFixed(1)}%），呈現明顯差異。`,
      `此差異可能影響${impact}。`
    ];
  }

  function buildSummary(text) {
    return text ? `<div class="card-footer"><div class="helper" style="font-size:15px">${text}</div></div>` : "";
  }

  function buildMetricCard(value, label, note) {
    return `<div class="metric-card"><strong>${value}</strong><span>${label}</span>${note ? `<small>${note}</small>` : ""}</div>`;
  }

  function formatSceneLabel(label) {
    if (!label.includes("：")) return label === "沒有時間看完" ? "未讀完" : label;
    const parts = label.split("：");
    const scene = parts[0].trim();
    const desc = parts.slice(1).join("：").replace(/[「」"]/g, "").trim();
    const shortDesc = desc.length > 12 ? `${desc.slice(0, 12)}…` : desc;
    return `#${scene} ${shortDesc}`;
  }

  function isUnreadSceneLabel(label) {
    return label === "沒有時間看完" || label === "未讀完";
  }

  function buildQuadrant(config) {
    const zoneClasses = ["tl", "tr", "bl", "br"];
    const labelOffset = 10;
    return `
      <div class="quad">
        <div class="axis-top">${config.top}</div>
        <div class="axis-bottom">${config.bottom}</div>
        <div class="axis-left">${config.left}</div>
        <div class="axis-right">${config.right}</div>
        ${config.zones.map((zone, index) => `<div class="quad-label ${zoneClasses[index] || "tl"}">${zone.text}</div>`).join("")}
        ${config.items.map((item) => {
          const radius = item.size / 2;
          const labelWidth = Math.max(48, item.label.length * 13);
          let pos = "pos-right";
          let left = `calc(${item.x}% + ${radius + labelOffset}px)`;
          let top = `${item.y}%`;
          if (item.x > 76) {
            pos = "pos-left";
            left = `calc(${item.x}% - ${radius + labelOffset}px)`;
          } else if (item.y < 16) {
            pos = "pos-right-down";
            top = `calc(${item.y}% + ${radius + labelOffset}px)`;
          } else if (item.y > 84) {
            pos = "pos-right-up";
            top = `calc(${item.y}% - ${radius + labelOffset}px)`;
          } else if (item.x > 66 && item.x + (labelWidth / 4) > 92) {
            pos = "pos-left";
            left = `calc(${item.x}% - ${radius + labelOffset}px)`;
          }
          return `
          <div class="bubble" style="left:${item.x}%;top:${item.y}%;width:${item.size}px;height:${item.size}px;background:${item.color}">${item.count}</div>
          <div class="bubble-label ${pos}" style="left:${left};top:${top}">${item.label}</div>
        `;
        }).join("")}
      </div>
    `;
  }

  function buildRadar(items, total) {
    const size = 420;
    const cx = 210;
    const cy = 210;
    const radius = 128;
    const angleStep = Math.PI * 2 / items.length;
    const levels = [0.25, 0.5, 0.75, 1];
    const points = items.map((item, index) => {
      const angle = -Math.PI / 2 + angleStep * index;
      const ratio = pctValue(item.count, total) / 100;
      return {
        x: cx + Math.cos(angle) * radius * ratio,
        y: cy + Math.sin(angle) * radius * ratio,
        labelX: cx + Math.cos(angle) * (radius + 34),
        labelY: cy + Math.sin(angle) * (radius + 34),
        anchor: Math.cos(angle) > 0.35 ? "start" : Math.cos(angle) < -0.35 ? "end" : "middle",
        label: `${item.label} ${pct(item.count, total)}`
      };
    });
    return `
      <svg viewBox="0 0 ${size} ${size}" style="width:100%;max-width:560px;display:block;margin:0 auto">
        ${levels.map((level) => `
          <polygon fill="none" stroke="rgba(255,255,255,.08)" points="${items.map((_, index) => {
            const angle = -Math.PI / 2 + angleStep * index;
            return `${cx + Math.cos(angle) * radius * level},${cy + Math.sin(angle) * radius * level}`;
          }).join(" ")}"></polygon>
        `).join("")}
        ${items.map((_, index) => {
          const angle = -Math.PI / 2 + angleStep * index;
          return `<line x1="${cx}" y1="${cy}" x2="${cx + Math.cos(angle) * radius}" y2="${cy + Math.sin(angle) * radius}" stroke="rgba(255,255,255,.08)"></line>`;
        }).join("")}
        <polygon fill="rgba(215,187,122,.24)" stroke="var(--gold)" stroke-width="2.5" points="${points.map((point) => `${point.x},${point.y}`).join(" ")}"></polygon>
        ${points.map((point) => `
          <g>
            <circle cx="${point.x}" cy="${point.y}" r="4" fill="var(--gold)"></circle>
            <text x="${point.labelX}" y="${point.labelY}" fill="var(--text-soft)" font-size="12" text-anchor="${point.anchor}">${point.label}</text>
          </g>
        `).join("")}
      </svg>
    `;
  }

  function renderLineChart(line) {
    const width = 1120;
    const height = 340;
    const pad = { top: 24, right: 28, bottom: 52, left: 62 };
    const innerWidth = width - pad.left - pad.right;
    const innerHeight = height - pad.top - pad.bottom;
    const step = innerWidth / (line.ticks.length - 1);
    const ticks = [0, 5, 10, 15, 20, 25];
    const y = (value) => pad.top + innerHeight - value / line.maxY * innerHeight;
    return `
      <div class="line-panel">
        <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
          <text x="18" y="${pad.top + innerHeight / 2}" fill="var(--text-soft)" font-size="12" transform="rotate(-90 18 ${pad.top + innerHeight / 2})">人數</text>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          <line x1="${pad.left}" y1="${pad.top + innerHeight}" x2="${pad.left + innerWidth}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.12)"></line>
          ${ticks.map((tick) => `
            <g>
              <line x1="${pad.left}" y1="${y(tick)}" x2="${pad.left + innerWidth}" y2="${y(tick)}" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></line>
              <text x="${pad.left - 10}" y="${y(tick) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${tick}</text>
            </g>
          `).join("")}
          ${line.ticks.map((tick, index) => `<text x="${pad.left + step * index}" y="${height - 14}" fill="var(--muted)" font-size="11" text-anchor="middle">${tick}</text>`).join("")}
          ${line.series.map((series) => {
            const points = series.values.map((value, index) => value == null ? null : [pad.left + step * index, y(value), value]).filter(Boolean);
            return `
              <polyline fill="none" stroke="${series.color}" stroke-width="3.5" points="${points.map((point) => `${point[0]},${point[1]}`).join(" ")}"></polyline>
              ${points.map((point) => `
                <g>
                  <circle cx="${point[0]}" cy="${point[1]}" r="5.5" fill="${series.color}"></circle>
                  <text x="${point[0]}" y="${point[1] - 12}" fill="${series.color}" font-size="11" text-anchor="middle">${point[2]}</text>
                </g>
              `).join("")}
            `;
          }).join("")}
        </svg>
      </div>
    `;
  }

  function buildComparison(items, groups) {
    return `
      <div class="compare-stack">
        ${items.map((item) => `
          <div class="compare-group">
            <div class="compare-title">${item.label}</div>
            ${item.note ? `<div class="compare-sub">${item.note}</div>` : ""}
            ${groups.map((group) => `
              <div class="compare-row">
                <div class="compare-label" style="color:${group.color}">${group.label}</div>
                <div class="track bar-wrap"><div class="fill bar-fill ${item.values[group.key].count === 0 ? "zero" : ""}" style="${fillWidthStyle(item.values[group.key].count, 100, group.color)}"><span class="bar-value">${item.values[group.key].count}</span></div></div>
                <div class="bar-pct">${item.values[group.key].pct.toFixed(1)}%</div>

            `).join("")}
          </div>
        `).join("")}
      </div>

      const totalB = (b.values.male.count || 0) + (b.values.female.count || 0);
      return totalB - totalA || a.label.localeCompare(b.label, "zh-Hant");
    });
    return `
      <div class="stacked-compare">

          const maleCount = item.values.male.count || 0;
          const femaleCount = item.values.female.count || 0;
          const totalCount = maleCount + femaleCount;
          const rows = [
            { key: "male", label: "男", color: genderPalette["男"], count: maleCount },
            { key: "female", label: "女", color: genderPalette["女"], count: femaleCount }
          ];
        return `
          <div class="stacked-row">
            <div class="stacked-label">${item.label}</div>

              const width = pctValue(row.count, groupTotals[row.key]);

              return `
                <div class="stacked-subrow">
                  <div class="stacked-key" style="color:${row.color}">${row.label}</div>
                  <div class="stacked-track">
                    <div class="stacked-seg ${small ? "small" : ""}" style="width:${width}%;background:${row.color};min-width:${row.count > 0 ? Math.min(20 + Math.max(row.count - 1, 0) * 5, 42) : 0}px">
                      <span class="seg-value">${row.count}/${groupTotals[row.key]}</span>
                    </div>
                  </div>
                  <div class="stacked-total">${pct(row.count, groupTotals[row.key])}</div>
                </div>

  function buildAgeGroupedComparison(items, ageGroups, groupTotals) {
    return `
      <div class="grouped-compare">
        ${items.map((item) => `
          <div class="grouped-group">
            <div class="grouped-title">${item.label}</div>
            <div class="grouped-rows">
              ${ageGroups.map((group) => {
                const count = item.values[group.key].count || 0;
                const subgroupTotal = groupTotals[group.key] || 0;
                return `
                <div class="grouped-row">
                  <div class="grouped-label" style="color:${group.color}">${group.label}</div>

              }).join("")}
            </div>
          </div>
        `).join("")}
      </div>

  function buildAgeHeatmap(items, ageGroups, groupTotals) {
    return `
      <div class="age-matrix">
        <div class="age-matrix-head">
          <div class="age-matrix-colhead"><strong>角色</strong></div>
          ${ageGroups.map((group) => `<div class="age-matrix-colhead"><strong>${group.label}</strong><span>n=${groupTotals[group.key] || 0}</span></div>`).join("")}
          <div class="age-matrix-colhead"><strong>洞察</strong><span>以各年齡比例比較</span></div>
        </div>
        ${items.map((item) => {
          const counts = ageGroups.map((group) => item.values[group.key].count || 0);
          const pcts = ageGroups.map((group) => item.values[group.key].pct || 0);
          const peak = Math.max.apply(null, pcts);
          const peakIndex = pcts.indexOf(peak);
          const low = Math.min.apply(null, pcts);
          const lowIndex = pcts.indexOf(low);
          const insight = peak > 0
            ? `${ageGroups[peakIndex].label}最高（${pcts[peakIndex].toFixed(1)}%），${ageGroups[lowIndex].label}較低（${pcts[lowIndex].toFixed(1)}%）。`
            : "三個年齡層皆未形成明顯偏好。";
          return `
          <div class="age-matrix-row ${peak > 0 ? "is-highlight" : ""}">
            <div class="age-matrix-role" style="color:${colorForRole(item.label)}">${item.label}</div>
            ${ageGroups.map((group, index) => {
              const intensity = pcts[index] / 100;
              const isPeak = pcts[index] === peak && peak > 0;
              const bg = isPeak
                ? colorForRole(item.label)
                : `rgba(255,255,255,${0.02 + intensity * 0.05})`;
              const textColor = isPeak ? "#111" : "var(--text)";
              return `
              <div class="age-matrix-cell" style="background:${bg};color:${textColor}">
                <div>
                  <strong style="color:${textColor}">${Math.round(pcts[index])}%</strong>
                  <span style="color:${isPeak ? "rgba(17,17,17,.74)" : "var(--text-soft)"}">${counts[index]}人</span>
                </div>
              </div>

            }).join("")}
            <div class="age-matrix-insight">${insight}</div>
          </div>
        `;
        }).join("")}
      </div>
    `;
  }

  function sequelCounts() {
    const labels = ["小潔", "白賊七", "虎姑婆", "局長", "好鼻師", "虎哥", "狐仙", "蜥蜴"];
    return labels.map((label) => ({
      label,
      count: respondents.filter((row) => (row.sequel || "").includes(label)).length,
      color: colorForRole(label)
    })).filter((item) => item.count > 0).sort((a, b) => b.count - a.count);
  }

  function roleSummaryCards() {
    const likeMap = countMulti(respondents, "likes");
    const sequelMap = Object.fromEntries(sequelCounts().map((item) => [item.label, item.count]));
    const confusingMap = countMulti(respondents, "confusing");
    const roleKeys = {
      "白賊七": ["白賊七：詛咒", "白賊七：匕首"],
      "虎姑婆": ["虎姑婆"],
      "好鼻師": ["好鼻師：操控螞蟻", "好鼻師：氣味偵查"],
      "小潔": ["小潔：讀心術"]
    };
    return majorRoles.map((role) => {
      const unclear = roleKeys[role].reduce((sum, key) => sum + (confusingMap[key] || 0), 0);
      const like = likeMap[role] || 0;
      const clear = Math.max(respondents.length - unclear, 0);
      const sequel = sequelMap[role] || 0;
      return {
        role,
        color: colorForRole(role),
        like,
        clear,
        sequel,
        metrics: [
          { label: "喜愛度", value: like, ratio: pctValue(like, respondents.length), color: roleTone(role, 1) },
          { label: "能力清晰度", value: clear, ratio: pctValue(clear, respondents.length), color: roleTone(role, 0.8) },
          { label: "續集潛力", value: sequel, ratio: pctValue(sequel, respondents.length), color: roleTone(role, 0.6) }
        ]
      };
    }).sort((a, b) => b.like - a.like);
  }

  function renderHistogram() {

    const width = 1120;
    const height = 340;
    const pad = { top: 20, right: 22, bottom: 58, left: 64 };
    const innerWidth = width - pad.left - pad.right;
    const innerHeight = height - pad.top - pad.bottom;
    const maxCount = Math.max.apply(null, counts.map((item) => item.count).concat([1]));
    const yMax = Math.max(15, Math.ceil(maxCount / 5) * 5);
    const yTicks = Array.from({ length: yMax / 5 + 1 }, (_, index) => index * 5);
    const step = innerWidth / counts.length;
    const barWidth = Math.min(54, step * 0.62);
    const y = (value) => pad.top + innerHeight - value / yMax * innerHeight;
    return `
      <div class="histogram-panel">
        <svg viewBox="0 0 ${width} ${height}" aria-hidden="true">
          <text x="18" y="${pad.top + innerHeight / 2}" fill="var(--text-soft)" font-size="12" transform="rotate(-90 18 ${pad.top + innerHeight / 2})">人數</text>
          <text x="${pad.left + innerWidth / 2}" y="${height - 10}" fill="var(--text-soft)" font-size="12" text-anchor="middle">分數</text>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.14)"></line>
          <line x1="${pad.left}" y1="${pad.top + innerHeight}" x2="${pad.left + innerWidth}" y2="${pad.top + innerHeight}" stroke="rgba(255,255,255,.14)"></line>
          ${yTicks.map((tick) => `
            <g>
              <line x1="${pad.left}" y1="${y(tick)}" x2="${pad.left + innerWidth}" y2="${y(tick)}" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></line>
              <text x="${pad.left - 10}" y="${y(tick) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${tick}</text>
            </g>
          `).join("")}
          ${counts.map((item, index) => {
            const centerX = pad.left + step * index + step / 2;
            const barHeight = item.count === 0 ? 8 : Math.max(12, innerHeight * (item.count / yMax));
            const topY = pad.top + innerHeight - barHeight;
            const fill = item.count === 0 ? "rgba(255,255,255,.08)" : (item.label >= 7 ? "var(--gold)" : item.label >= 5 ? "var(--orange)" : "var(--stone)");
            const stroke = item.count === 0 ? "rgba(255,255,255,.12)" : "none";
            return `
            <g>
              <rect x="${centerX - barWidth / 2}" y="${topY}" width="${barWidth}" height="${barHeight}" rx="10" fill="${fill}" stroke="${stroke}"></rect>
              <text x="${centerX}" y="${topY - 8}" fill="var(--text-soft)" font-size="11" text-anchor="middle">${item.count}</text>
              <text x="${centerX}" y="${pad.top + innerHeight + 18}" fill="var(--muted)" font-size="11" text-anchor="middle">${item.label}</text>
            </g>
          `;
          }).join("")}
        </svg>
      </div>
    `;
  }

  function renderReception() {
    const total = respondents.length;
    const scores = respondents.map((row) => row.scriptScore);
    const entrance = respondents.filter((row) => row.entrance).length;
    const recommend = respondents.filter((row) => row.recommend).length;
    const recommenders = respondents.filter((row) => row.recommend);
    const reasons = toBarData(countMulti(recommenders, "recommendReasons"), {
      colors: {
        "妖怪傳說": "var(--c-tiger)",
        "動作場面": "var(--c-nose)",
        "諜報野史": "var(--blue)",
        "情感真摯": "var(--c-jie)",
        "劇情精彩": "var(--orange)",
        "特效程度": "var(--stone)",
        "支持國片": "var(--green)"
      }
    }).filter((item) => !["不推薦", "看看這個劇本畫面如何呈現。", "不知道實際拍起來如何，要看過後才能決定要不要推薦朋友看", "不推薦是因為還沒看過，如果親自看過覺得精彩，當然一定會推薦，而不是現在。", "如果看了覺得不錯當然會推薦：根據劇本，很多場景的成敗與拍攝手法以及動畫製作的細膩度有高度關係。", "因為我知道這部片會是很棒的主創團隊做出來的", "到最後一定會有精彩的劇情、好看的動作場面、真摯的演員情感", "蠻適合小朋友，會推薦給有小孩的朋友"].includes(item.label));
    document.getElementById("body-reception").innerHTML = `
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Open Response Map <span class="n-tag">開放填答 · n=35</span></div><div class="card-title">影視聯想象限分析</div></div></div>
        ${buildQuadrant({
          top: "主流",
          bottom: "小眾",
          left: "歐美",
          right: "亞日台",
          zones: data.reception.associations.zones,
          items: data.reception.associations.items.map((item) => ({
            ...item,
            size: item.count >= 8 ? 56 : item.count >= 7 ? 50 : item.count >= 5 ? 38 : item.count >= 3 ? 30 : 22,
            dx: item.dx > 0 ? 16 : -16
          }))
        })}
      </div>
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Question <span class="n-tag">1–10 分 · n=35</span></div><div class="card-title">劇本評分</div></div></div>
        <div class="metrics-3" style="margin-bottom:18px">
          ${buildMetricCard(mean(scores).toFixed(2), "平均數（分數）")}
          ${buildMetricCard(String(median(scores)), "中位數（分數）")}
          ${buildMetricCard(trimmedMean(scores, 0.1).toFixed(2), "去極值平均（分數）", "前後各去除 10% 樣本")}
        </div>
        ${renderHistogram()}
      </div>
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Question Group <span class="n-tag">單選 · n=35</span></div><div class="card-title">入場 / 推薦意願</div></div></div>
        <div class="split-pair">
          ${buildMetricCard(pct(entrance, total), "入場意願")}
          ${buildMetricCard(pct(recommend, total), "推薦意願")}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Question <span class="n-tag">多選 · 推薦者 n=${recommenders.length}</span></div><div class="card-title">推薦原因</div></div></div>
        ${buildBarRows(reasons, recommenders.length)}
      </div>
    `;
  }

  function currentCrossRows() {
    return respondents.filter((row) => {
      if (state.crossTab === "gender" && state.crossAge !== "全部" && row.ageBucket !== state.crossAge) return false;
      if (state.crossTab === "age" && state.crossGender !== "全部" && row.gender !== state.crossGender) return false;
      return true;
    });
  }

  function renderGenderCross(rows) {
    const male = rows.filter((row) => row.gender === "男");
    const female = rows.filter((row) => row.gender === "女");
    const nukeItem = {
      label: "核彈歷史知曉比例",
      values: {
        male: { count: male.filter((row) => row.nukeAware).length, pct: pctValue(male.filter((row) => row.nukeAware).length, male.length) },
        female: { count: female.filter((row) => row.nukeAware).length, pct: pctValue(female.filter((row) => row.nukeAware).length, female.length) }
      }
    };
    const roleItems = majorRoles.map((role) => ({
      label: role,
      values: {
        male: { count: male.filter((row) => row.likes.includes(role)).length, pct: pctValue(male.filter((row) => row.likes.includes(role)).length, male.length) },
        female: { count: female.filter((row) => row.likes.includes(role)).length, pct: pctValue(female.filter((row) => row.likes.includes(role)).length, female.length) }
      }
    }));
    const marketItems = [
      {
        label: "入場意願",
        values: {
          male: { count: male.filter((row) => row.entrance).length, pct: pctValue(male.filter((row) => row.entrance).length, male.length) },
          female: { count: female.filter((row) => row.entrance).length, pct: pctValue(female.filter((row) => row.entrance).length, female.length) }
        }
      },
      {
        label: "推薦意願",
        values: {
          male: { count: male.filter((row) => row.recommend).length, pct: pctValue(male.filter((row) => row.recommend).length, male.length) },
          female: { count: female.filter((row) => row.recommend).length, pct: pctValue(female.filter((row) => row.recommend).length, female.length) }
        }
      }
    ];
    return `
      <div class="section-stack">
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Gender Analysis</div><div class="card-title">核彈歷史知曉比例</div></div></div>
          <div class="split-pair">
            <div class="world-right">
              <div class="linked-title" style="margin-bottom:12px;text-align:center">男生樣本</div>
              ${buildDonut([
                { label: "知道", count: nukeItem.values.male.count, color: genderPalette["男"] },
                { label: "不知道", count: male.length - nukeItem.values.male.count, color: "var(--stone)" }
              ], male.length, "知道", "知道")}
            </div>
            <div class="world-right">
              <div class="linked-title" style="margin-bottom:12px;text-align:center">女生樣本</div>
              ${buildDonut([
                { label: "知道", count: nukeItem.values.female.count, color: genderPalette["女"] },
                { label: "不知道", count: female.length - nukeItem.values.female.count, color: "var(--stone)" }
              ], female.length, "知道", "知道")}
            </div>
          </div>
          ${buildInsight(comparisonInsight(
            { name: "男性族群", pct: nukeItem.values.male.pct },
            { name: "女性族群", pct: nukeItem.values.female.pct },
            "核彈歷史知曉比例",
            "部分觀眾對相關劇情設定的理解程度"
          ))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Gender Analysis</div><div class="card-title">喜歡角色比例</div></div></div>
          ${buildGenderRoleCards(roleItems, { male: male.length, female: female.length })}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Gender Analysis</div><div class="card-title">市場反應比較</div></div></div>
          ${buildGenderStackedComparison(marketItems, { male: male.length, female: female.length })}
          ${buildInsight(comparisonInsight(
            { name: "男性族群", pct: marketItems[1].values.male.pct },
            { name: "女性族群", pct: marketItems[1].values.female.pct },
            "推薦意願",
            "整體接受度"
          ))}
        </div>
      </div>
    `;
  }

  function renderAgeCross(rows) {
    const pools = Object.fromEntries(ageBuckets.map((bucket) => [bucket, rows.filter((row) => row.ageBucket === bucket)]));
    const groups = ageBuckets.map((bucket, index) => ({ key: bucket, label: bucket, color: ["rgba(215,187,122,.42)", "rgba(215,187,122,.68)", "rgba(215,187,122,.96)"][index] }));
    const groupTotals = Object.fromEntries(ageBuckets.map((bucket) => [bucket, pools[bucket].length]));
    const nukeItem = {
      label: "核彈歷史知曉比例",
      values: Object.fromEntries(ageBuckets.map((bucket) => {
        const pool = pools[bucket];
        const count = pool.filter((row) => row.nukeAware).length;
        return [bucket, { count, pct: pctValue(count, pool.length) }];
      }))
    };
    const roleItems = majorRoles.map((role) => ({
      label: role,
      values: Object.fromEntries(ageBuckets.map((bucket) => {
        const pool = pools[bucket];
        const count = pool.filter((row) => row.likes.includes(role)).length;
        return [bucket, { count, pct: pctValue(count, pool.length) }];
      }))
    }));
    const marketItems = [
      {
        label: "入場意願",
        values: Object.fromEntries(ageBuckets.map((bucket) => {
          const pool = pools[bucket];
          const count = pool.filter((row) => row.entrance).length;
          return [bucket, { count, pct: pctValue(count, pool.length) }];
        }))
      },
      {
        label: "推薦意願",
        values: Object.fromEntries(ageBuckets.map((bucket) => {
          const pool = pools[bucket];
          const count = pool.filter((row) => row.recommend).length;
          return [bucket, { count, pct: pctValue(count, pool.length) }];
        }))
      }
    ];
    const ranked = ageBuckets.map((bucket) => ({ name: `${bucket}族群`, pct: nukeItem.values[bucket].pct })).sort((a, b) => b.pct - a.pct);
    const highestRank = ranked[0] || { name: "目前樣本", pct: 0 };
    const lowestRank = ranked[ranked.length - 1] || { name: "目前樣本", pct: 0 };
    const rolePeak = roleItems.map((item) => ({
      label: item.label,
      top: ageBuckets.map((bucket) => ({ bucket, pct: item.values[bucket].pct })).sort((a, b) => b.pct - a.pct)[0]
    })).sort((a, b) => b.top.pct - a.top.pct)[0] || { label: "無", top: { bucket: "無", pct: 0 } };
    const marketPeak = marketItems.map((item) => ({
      label: item.label,
      top: ageBuckets.map((bucket) => ({ bucket, pct: item.values[bucket].pct })).sort((a, b) => b.pct - a.pct)[0]
    })).sort((a, b) => b.top.pct - a.top.pct)[0] || { label: "無", top: { bucket: "無", pct: 0 } };
    const marketGap = ageBuckets.map((bucket) => ({
      bucket,
      entrance: marketItems[0].values[bucket].pct,
      recommend: marketItems[1].values[bucket].pct
    })).sort((a, b) => Math.abs(b.entrance - b.recommend) - Math.abs(a.entrance - a.recommend))[0] || { bucket: "目前樣本", entrance: 0, recommend: 0 };
    return `
      <div class="section-stack">
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">核彈歷史知曉比例</div></div></div>
          ${buildAgeGroupedComparison([nukeItem], groups, groupTotals)}
          ${buildInsight(comparisonInsight(highestRank, ranked[1] || lowestRank, "核彈歷史知曉比例", "部分觀眾對相關劇情設定的理解程度"))}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">喜歡角色比例</div><div class="card-note">${ageBuckets.map((bucket) => `${bucket}（n=${groupTotals[bucket] || 0}）`).join(" ・ ")}</div></div></div>
          ${buildAgeHeatmap(roleItems, groups, groupTotals)}
        </div>
        <div class="card">
          <div class="card-head"><div><div class="eyeline">Age Analysis</div><div class="card-title">市場反應比較</div></div></div>
          ${buildAgeGroupedComparison(marketItems, groups, groupTotals)}
        </div>
      </div>
    `;
  }

  function renderCross() {
    const rows = currentCrossRows();
    document.getElementById("body-cross").innerHTML = `
      <div class="card">
        <div class="card-head"><div><div class="eyeline">Cross Analysis</div><div class="card-title">交叉分析</div></div></div>
        <div class="seg-tabs" style="margin-bottom:14px">
          <button type="button" class="chip ${state.crossTab === "gender" ? "active" : ""}" data-cross-tab="gender">性別分析</button>
          <button type="button" class="chip ${state.crossTab === "age" ? "active" : ""}" data-cross-tab="age">年齡分析</button>
        </div>
        <div class="filter-row" style="margin-bottom:14px">
          <div class="filter-caption">${state.crossTab === "gender" ? "年齡篩選" : "性別篩選"}</div>
          ${(state.crossTab === "gender" ? ["全部"].concat(ageBuckets) : ["全部", "男", "女"]).map((value) => `
            <button type="button" class="chip ${(state.crossTab === "gender" ? state.crossAge : state.crossGender) === value ? "active" : ""}" data-cross-key="${state.crossTab === "gender" ? "age" : "gender"}" data-cross-value="${value}">${value}</button>
          `).join("")}
        </div>
        <div class="current-filters">
          <span class="current-tag">分析維度：${state.crossTab === "gender" ? "性別" : "年齡"}</span>
          <span class="current-tag">${state.crossTab === "gender" ? `年齡篩選：${state.crossAge}` : `性別篩選：${state.crossGender}`}</span>
          <span class="current-tag">目前樣本：n=${rows.length}</span>
        </div>
      </div>
      ${rows.length ? (state.crossTab === "gender" ? renderGenderCross(rows) : renderAgeCross(rows)) : `<div class="card"><div class="helper">目前篩選條件下沒有樣本。</div></div>`}
    `;
  }

  function renderQualitative() {
    document.getElementById("body-qualitative").innerHTML = `
      <div class="card qualitative-section">
        <div class="card-head"><div><div class="eyeline">Qualitative</div><div class="card-title">正向回饋</div></div></div>
        <div class="section-stack">
          ${qualitativeGroups.positive.map((item) => `
            <div class="theme qualitative-topic">
              <div class="theme-head">
                <span class="theme-count good">${item.count}則</span>
                <div class="theme-title">${item.title}</div>
              </div>
              <div class="qualitative-quotes">${buildExpand(item.quotes, 2, { directShowMax: 4 })}</div>
            </div>
          `).join("")}
        </div>
      </div>
      <div style="height:18px"></div>
      <div class="card qualitative-section">
        <div class="card-head"><div><div class="eyeline">Qualitative</div><div class="card-title">待修正問題</div></div></div>
        <div class="section-stack">
          ${qualitativeGroups.issues.map((item) => `
            <div class="theme qualitative-topic">
              <div class="theme-head">
                <span class="theme-count issue">${item.count}則</span>
                <div class="theme-title">${item.title}</div>
              </div>
              <div class="qualitative-quotes">${buildExpand(item.quotes, 2, { directShowMax: 4 })}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function bind() {
    document.querySelectorAll("[data-page]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        state.page = this.getAttribute("data-page");
        document.querySelectorAll(".nav-btn").forEach((node) => node.classList.toggle("active", node === this));
        document.querySelectorAll(".page").forEach((node) => node.classList.toggle("active", node.id === `page-${state.page}`));
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    document.querySelectorAll(".expand-btn").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        const wrap = this.closest(".expand");
        wrap.classList.toggle("open");
        const remaining = this.getAttribute("data-remaining");
        this.firstElementChild.textContent = wrap.classList.contains("open") ? "收合" : `展開更多（${remaining}則）`;
        this.lastElementChild.textContent = wrap.classList.contains("open") ? "▲" : "▼";
      });
    });
    document.querySelectorAll("[data-reason-type]").forEach((select) => {
      if (select.dataset.bound) return;
      select.dataset.bound = "1";
      select.addEventListener("change", function () {
        if (this.getAttribute("data-reason-type") === "like") state.reasonLike = this.value;
        else state.reasonDislike = this.value;
        renderCharacters();
        bind();
      });
    });
    document.querySelectorAll("[data-cross-tab]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        state.crossTab = this.getAttribute("data-cross-tab");
        renderCross();
        bind();
      });
    });
    document.querySelectorAll("[data-cross-key]").forEach((button) => {
      if (button.dataset.bound) return;
      button.dataset.bound = "1";
      button.addEventListener("click", function () {
        if (this.getAttribute("data-cross-key") === "age") state.crossAge = this.getAttribute("data-cross-value");
        else state.crossGender = this.getAttribute("data-cross-value");
        renderCross();
        bind();
      });
    });
  }

  function renderAll() {
    renderNav();
    renderShell();
    renderAudience();
    renderWorldview();
    renderCharacters();
    renderPowers();
    renderPlot();
    renderReception();
    renderCross();
    renderQualitative();
    bind();
  }

  try {
    renderAll();
  } catch (error) {
    console.error(error);
    const panel = document.getElementById("bootError");
    panel.classList.remove("hidden");
    panel.innerHTML = `
      <strong style="display:block;margin-bottom:8px">Dashboard 載入失敗</strong>
      <div style="font-size:14px;line-height:1.7">錯誤訊息：<code>${String(error && error.message ? error.message : error)}</code></div>
    `;
  }
})();
</script></script>
</body>
</html>
